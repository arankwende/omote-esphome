substitutions:
  name: omote
  friendly_name: Omote Remote
  ha_api_key: "YourHAAPIKey"
  ota_key: "YourOTAKey"
  # Home Assistant Entity IDs (update these to match your setup)
  climate_entity: climate.room_ac
  light_entity: light.room_light
  temp_sensor_entity: sensor.room_temperature
  #IP Configuration for static IP - to enable it, first un comment the section in Wifi
#  static_ip: 192.168.1.101
#  gateway: 192.168.1.1
#  subnet: 255.255.255.0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Required to set lcd_rd off before display will work
    - priority: 600
      then:
        - output.turn_off: lcd_rd

# External components
# NOTE: Comment out components that cause boot loops if hardware not detected
external_components:
  # QMI8658 IMU sensor - uncomment if IMU is working
  # - source: github://dala318/esphome-qmi8658
  #   components: [qmi8658]
  # TCA8418 keypad matrix -github component
  # - source: github://arankwende/esphome-tca8418_keypad
  #   components: [tca8418_keypad]
  # TCA8418 keypad matrix - using local component based on Adafruit library
  - source:
      type: local
      path: components
    components: [tca8418_keypad]

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Deep sleep configuration
# Wake sources: GPIO03 (power button), touch, and IMU motion
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO03
    allow_other_uses: true
    inverted: true  # Wake on button press (LOW)
  wakeup_pin_mode: KEEP_AWAKE
  # Note: For gyroscope wake, the IMU INT pin would need to be connected
  # to an EXT1 capable GPIO (0-21 on ESP32-S3). If your Omote has this,
  # add it to esp32_ext1_wakeup below
  # esp32_ext1_wakeup:
  #   pins:
  #     - GPIO07  # IMU INT pin if available
  #   mode: ANY_HIGH

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ${ha_api_key}
  on_client_connected:
    - logger.log: "Home Assistant connected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0x00FF00
  on_client_disconnected:
    - logger.log: "Home Assistant disconnected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
ota:
  - platform: esphome
    password: ${ota_key}


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFFFFFF
  on_disconnect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
# Manual IP config
#  manual_ip:
#      static_ip: ${static_ip}
#      gateway: ${gateway}
#      subnet: ${subnet}

web_server:
  port: 80

psram:
  mode: quad
  speed: 80MHz

http_request:
  useragent: esphome/omote
  timeout: 10s



#set up battery sensor (MAX17043/MAX17048 fuel gauge at I2C 0x36)
sensor:
  - platform: max17043
    battery_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    battery_level:
      id: battery_level
      name: "Battery Level"
    update_interval: 60s
  # Home Assistant sensors
  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_sensor_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_temperature
          text:
            format: "%.1f°C"
            args: ['x']
  - platform: homeassistant
    id: climate_target_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_target_temp
          text:
            format: "%.0f°C"
            args: ['x']

  # QMI8658 IMU sensor for motion wake detection
  # NOTE: Commented out - may cause boot loop if sensor not present
  # Uncomment after confirming device boots and IMU is detected on I2C scan
  # - platform: qmi8658
  #   address: 0x6B
  #   acceleration_x:
  #     id: accel_x
  #     internal: true
  #   acceleration_y:
  #     id: accel_y
  #     internal: true
  #   acceleration_z:
  #     id: accel_z
  #     internal: true
  #   gyroscope_x:
  #     id: gyro_x
  #     internal: true
  #   gyroscope_y:
  #     id: gyro_y
  #     internal: true
  #   gyroscope_z:
  #     id: gyro_z
  #     internal: true
  #   update_interval: 500ms
button:
  - platform: restart
    name: "Restart"
text_sensor:
  # Climate state
  - platform: homeassistant
    id: climate_state
    entity_id: ${climate_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_climate_mode
          text: !lambda 'return x;'
  # Light state
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    on_value:
      - if:
          condition:
            lambda: 'return x == "on";'
          then:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0xFFCC00
          else:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0x333333
  # TV media player info
binary_sensor:
# Power button for deep sleep toggle (GPIO03)
#  - platform: gpio
#    id: power_button
#    name: "Power Button"
#    pin:
#      number: GPIO03
#      mode: INPUT_PULLUP
#      inverted: true
#      allow_other_uses: true
#    filters:
