#    on_press:
#      - if:
#          condition:
#            lambda: 'return id(device_sleeping);'
#          then:
#            - script.execute: script_wake_device
#          else:
#            - script.execute: script_enter_deep_sleep

  # ==================== TCA8418 MATRIX KEYPAD BUTTONS ====================
  # Using TCA8418 in keypad matrix mode (6 rows x 4 columns)
  # Matrix key formula: (row * 10) + col + 1
  # Row 0: keys 1, 2, 3, 4
  # Row 1: keys 11, 12, 13, 14
  # Row 2: keys 21, 22, 23, 24
  # Row 3: keys 31, 32, 33, 34
  # Row 4: keys 41, 42, 43, 44
  # Row 5: keys 51, 52, 53, 54
  #
  # You can also use row/col syntax: row: 0, col: 0 instead of key: 1
  #
  # NOTE: After flashing, check the logs to see which key codes are
  # generated when you press physical buttons, then update accordingly.
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_1
    row: 0
    col: 4
    name: "Botón 1"
    on_press:
