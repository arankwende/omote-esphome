      - logger.log: "Media 4"

  # Dpad buttons - TV navigation
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_up
    row: 1
    col: 3
    name: "DPAD Up"
    on_press:
      - logger.log: "DPAD Up"
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
