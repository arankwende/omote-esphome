globals:
  - id: current_page
    type: int
    initial_value: "0"
  - id: touch_x_start
    type: int
    initial_value: "0"
  - id: touch_y_start
    type: int
    initial_value: "0"
  - id: touch_x_end
    type: int
    initial_value: "0"
  - id: touch_y_end
    type: int
    initial_value: "0"
  # Device sleep state tracking
  - id: device_sleeping
    type: bool
    initial_value: "false"

script:

  # Deep sleep script
  - id: script_enter_deep_sleep
    then:
      - logger.log: "Entering deep sleep..."
      - globals.set:
          id: device_sleeping
          value: 'true'
      # Turn off the backlight before sleeping
      - light.turn_off: back_light
      # Small delay to ensure everything is ready
      - delay: 100ms
      # Enter deep sleep
      - deep_sleep.enter: deep_sleep_ctrl

  # Wake device script (called by power button or motion)
  - id: script_wake_device
    then:
      - logger.log: "Waking device..."
      - globals.set:
          id: device_sleeping
          value: 'false'
      - light.turn_on: back_light
      - lvgl.resume:
      - lvgl.widget.redraw:

  # Page navigation scripts (3 pages: room, music, tv)
  - id: script_next_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 1) % 3;'
      - lvgl.page.next:
          animation: MOVE_LEFT
          time: 300ms

  - id: script_prev_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 2) % 3;'
      - lvgl.page.previous:
          animation: MOVE_RIGHT
          time: 300ms

i2c:
  sda: GPIO20
  scl: GPIO19
  frequency: 400kHz
  # Expected devices: 0x38 (FT63X6 touchscreen), 0x34 (TCA8418 keypad), 0x6B (IMU)
  sda_pullup_enabled: False
  scl_pullup_enabled: False
  scan: true

# TCA8418 Keypad Controller (based on Adafruit library)
# Using GPI mode (rows=0, cols=0) - all pins are individual GPIOs
# GPIO key codes: ROW0-ROW7 = keys 97-104, COL0-COL9 = keys 105-114
tca8418_keypad:
  id: keypad
  address: 0x34
  rows: 0
  cols: 0
  interrupt_pin: 8

# IMU sensor for motion wake detection (QMI8658 on Omote)
# Used to wake device when picked up

output:
  # LCD Backlight GPIO
  - platform: ledc
    id: gpio_09
    pin:
      number: GPIO09
      inverted: true
  # Keypad Backlight GPIO
  - platform: ledc
    id: gpio_46
    pin:
      number: GPIO46
      inverted: False
  - platform: gpio
    # lcd_rd pin needs to be set HIGH before LCD will work.
    # Set HIGH (turn off) with boot priority in esphome section.
    id: lcd_rd
    pin:
      number: GPIO42
      inverted: True

light:
  - platform: monochromatic
    id: back_light
    output: gpio_09
    restore_mode: RESTORE_DEFAULT_ON
    name: "LCD Backlight"
  - platform: monochromatic
    output: gpio_46
    restore_mode: RESTORE_DEFAULT_OFF
    name: "Keypad Backlight"


touchscreen:
  - platform: ft63x6
    id: my_touch
    display: LCD
    address: 0x38
    calibration:
      x_min: 0
      x_max: 237
      y_min: 0
      y_max: 319
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lvgl.resume:
              - lvgl.widget.redraw:

spi:
  - id: quad_spi_bus
    type: octal
    clk_pin:
      number: GPIO41
    data_pins:
      - GPIO48
      - GPIO47
      - GPIO21
      - GPIO14
      - GPIO13
      - GPIO12
      - GPIO11
      - GPIO10

display:
  - platform: mipi_spi
    id: LCD
    model: ILI9341
    bus_mode: octal
    dc_pin: GPIO40
    cs_pin: GPIO39
    enable_pin:
      number: GPIO38
      inverted: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_20
    size: 20
    bpp: 4
    glyphs:
      - "\U000F092F"  # mdi:wifi
      - "\U000F0238"  # mdi:thermometer
      - "\U000F0335"  # mdi:lightbulb
      - "\U000F0336"  # mdi:lightbulb-outline
      - "\U000F0054"  # mdi:air-conditioner
      - "\U000F0F55"  # mdi:snowflake (cool)
      - "\U000F0210"  # mdi:fan
      - "\U000F0E4B"  # mdi:fire (heat)
      - "\U000F0425"  # mdi:power
      - "\U000F0415"  # mdi:plus
      - "\U000F0374"  # mdi:minus
      - "\U000F0450"  # mdi:refresh
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_36
    size: 36
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi:play
      - "\U000F03E4"  # mdi:pause
      - "\U000F04AD"  # mdi:skip-next
      - "\U000F04AE"  # mdi:skip-previous
      - "\U000F0238"  # mdi:thermometer
  - file: "gfonts://Roboto"
    id: roboto_14
    size: 10
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_18
    size: 18
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
    bpp: 4

lvgl:
  displays:
    - LCD
  touchscreens:
    - my_touch
  buffer_size: 25%
  on_idle:
    timeout: 30s
    then:
      - logger.log: "LVGL idle"
  pages:
    # ==================== PAGE 1: ROOM CONTROL ====================
    - id: room_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # WiFi indicator (top right)
        - label:
            id: lbl_wifi_room
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F092F"
            text_color: 0xFF0000
        # Temperature display section
        - obj:
            x: 10
            y: 10
            width: 220
            height: 60
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 15
                  text_font: mdi_36
                  text: "\U000F0238"
                  text_color: 0x4FC3F7
              - label:
                  id: lbl_temperature
                  x: 60
                  y: 10
                  width: 150
                  text_font: roboto_24
                  text: "--.-°C"
                  text_color: 0xFFFFFF
        # Climate card section
        - obj:
            x: 10
            y: 75
            width: 220
            height: 145
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 5
                  text_font: mdi_20
                  text: "\U000F0054"
                  text_color: 0x4FC3F7
              - label:
                  x: 40
                  y: 8
                  text_font: roboto_14
                  text: "AC"
                  text_color: 0xAAAAAA
              - label:
                  id: lbl_target_temp
                  x: 140
                  y: 5
                  width: 70
                  text_font: roboto_24
                  text: "--°C"
                  text_color: 0xFFFFFF
                  text_align: right
              - label:
                  id: lbl_climate_mode
                  x: 10
                  y: 30
                  width: 100
                  text_font: roboto_14
                  text: "off"
                  text_color: 0x888888
              # Mode buttons row
              # Off button
              - button:
                  id: btn_climate_off
                  x: 10
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0425"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.turn_off
                        data:
                          entity_id: ${climate_entity}
              # Cool button
              - button:
                  id: btn_climate_cool
                  x: 80
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0F55"
                        text_color: 0x4FC3F7
                  on_click:
                    - homeassistant.service:
                        service: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: cool
              # Heat button
              - button:
                  id: btn_climate_heat
                  x: 150
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0E4B"
                        text_color: 0xFF5722
                  on_click:
                    - homeassistant.service:
                        service: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: heat
              # Temperature decrease button
              - button:
                  id: btn_temp_down
                  x: 10
                  y: 95
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0374"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${climate_entity}
                          temperature: !lambda 'return id(climate_target_temp).state - 1;'
              # Temperature increase button
              - button:
                  id: btn_temp_up
                  x: 150
                  y: 95
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0415"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${climate_entity}
                          temperature: !lambda 'return id(climate_target_temp).state + 1;'
        # Light control section
        - obj:
            x: 10
            y: 225
            width: 220
            height: 45
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 10
                  text_font: mdi_20
                  text: "\U000F0335"
                  text_color: 0xFFCC00
              - label:
                  x: 40
                  y: 12
                  text_font: roboto_14
                  text: "Room Light"
                  text_color: 0xFFFFFF
              - button:
                  id: btn_light
                  x: 150
                  y: 5
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 17
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0425"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: ${light_entity}


   
switch:
  # IR Receiver power
  - platform: gpio
    name: "IR Receiver Power"
    pin:
      number: GPIO06
    restore_mode: ALWAYS_OFF

remote_receiver:
  pin:
    number: GPIO04
  dump: all
  use_dma: True

remote_transmitter:
  pin:
    number: GPIO05
    inverted: True
  carrier_duty_percent: 50%
  use_dma: True
