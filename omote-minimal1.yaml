substitutions:
  name: omote
  friendly_name: Omote Remote
  ha_api_key: "YourHAAPIKey"
  ota_key: "YourOTAKey"
  # Music Assistant Configuration
  ma_host: "192.168.1.100"
  ma_port: "8095"
  ma_token: "your_token_here"
  ma_player: "media_player.room_speaker"
  # Home Assistant Entity IDs (update these to match your setup)
  climate_entity: climate.room_ac
  light_entity: light.room_light
  cover_entity_left: cover.room_blinds_left
  cover_entity_right: cover.room_blinds_right
  temp_sensor_entity: sensor.room_temperature
  tv_media_player: media_player.room_tv
  # Automation scripts for physical buttons (customize these)
  # Row 1: Button 1 and Button 4
  automation_row1_btn1: script.your_automation_1
  automation_row1_btn4: script.your_automation_2
  # Row 2: Button 1 and Button 4
  automation_row2_btn1: script.your_automation_3
  automation_row2_btn4: script.your_automation_4
  # Row 4: Button 1 and Button 4
  automation_row4_btn1: script.your_automation_5
  automation_row4_btn4: script.your_automation_6


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Required to set lcd_rd off before display will work
    - priority: 600
      then:
        - output.turn_off: lcd_rd

# External components
# NOTE: Comment out components that cause boot loops if hardware not detected
external_components:
  # QMI8658 IMU sensor - uncomment if IMU is working
  # - source: github://dala318/esphome-qmi8658
  #   components: [qmi8658]
  # TCA8418 in GPI mode (not keypad matrix mode)
  - source: github://Zebble/esphome-tca8418@main
    components: [tca8418]

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Deep sleep configuration
# Wake sources: GPIO03 (power button), touch, and IMU motion
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO03
    allow_other_uses: true
    inverted: true  # Wake on button press (LOW)
  wakeup_pin_mode: KEEP_AWAKE
  # Note: For gyroscope wake, the IMU INT pin would need to be connected
  # to an EXT1 capable GPIO (0-21 on ESP32-S3). If your Omote has this,
  # add it to esp32_ext1_wakeup below
  # esp32_ext1_wakeup:
  #   pins:
  #     - GPIO07  # IMU INT pin if available
  #   mode: ANY_HIGH

# Enable logging
logger:
  level: VERY_VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: ${ha_api_key}
  on_client_connected:
    - logger.log: "Home Assistant connected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0x00FF00
  on_client_disconnected:
    - logger.log: "Home Assistant disconnected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
ota:
  - platform: esphome
    password: ${ota_key}


#set up battery sensor (MAX17043/MAX17048 fuel gauge at I2C 0x36)
sensor:
  - platform: max17043
    battery_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    battery_level:
      id: battery_level
      name: "Battery Level"
    update_interval: 180s
  # Home Assistant sensors
  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_sensor_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_temperature
          text:
            format: "%.1f°C"
            args: ['x']
  - platform: homeassistant
    id: climate_target_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_target_temp
          text:
            format: "%.0f°C"
            args: ['x']
  - platform: homeassistant
    id: blinds_position_left
    entity_id: ${cover_entity_left}
    attribute: current_position
    on_value:
      - lvgl.slider.update:
          id: slider_blinds_left
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_blinds_left_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  - platform: homeassistant
    id: blinds_position_right
    entity_id: ${cover_entity_right}
    attribute: current_position
    on_value:
      - lvgl.slider.update:
          id: slider_blinds_right
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_blinds_right_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  - platform: homeassistant
    id: music_volume
    entity_id: media_player.${ma_player}
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: slider_volume
          value: !lambda 'return (int)(x * 100);'
  # QMI8658 IMU sensor for motion wake detection
  # NOTE: Commented out - may cause boot loop if sensor not present
  # Uncomment after confirming device boots and IMU is detected on I2C scan
  # - platform: qmi8658
  #   address: 0x6B
  #   acceleration_x:
  #     id: accel_x
  #     internal: true
  #   acceleration_y:
  #     id: accel_y
  #     internal: true
  #   acceleration_z:
  #     id: accel_z
  #     internal: true
  #   gyroscope_x:
  #     id: gyro_x
  #     internal: true
  #   gyroscope_y:
  #     id: gyro_y
  #     internal: true
  #   gyroscope_z:
  #     id: gyro_z
  #     internal: true
  #   update_interval: 500ms
button:
  - platform: restart
    name: "Restart"
text_sensor:
  # Climate state
  - platform: homeassistant
    id: climate_state
    entity_id: ${climate_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_climate_mode
          text: !lambda 'return x;'
  # Light state
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    on_value:
      - if:
          condition:
            lambda: 'return x == "on";'
          then:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0xFFCC00
          else:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0x333333
  # TV media player info
  - platform: homeassistant
    id: tv_media_title
    entity_id: ${tv_media_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_tv_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: tv_media_artist
    entity_id: ${tv_media_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_tv_artist
          text: !lambda 'return x;'
  # Music Assistant player info
  - platform: homeassistant
    id: music_title
    entity_id: media_player.${ma_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_music_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_artist
    entity_id: media_player.${ma_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_music_artist
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_state
    entity_id: media_player.${ma_player}
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F03E4"
            - globals.set:
                id: music_playing
                value: 'true'
          else:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F040A"
            - globals.set:
                id: music_playing
                value: 'false'
  - platform: homeassistant
    id: music_album_art
    entity_id: media_player.${ma_player}
    attribute: entity_picture
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - online_image.set_url:
                id: album_art
                url: !lambda 'return x;'

binary_sensor:
  # Power button for deep sleep toggle (GPIO03)
  - platform: gpio
    id: power_button
    name: "Power Button"
    pin:
      number: GPIO03
      mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    filters:
      - delayed_on: 50ms
    on_press:
      - if:
          condition:
            lambda: 'return id(device_sleeping);'
          then:
            - script.execute: script_wake_device
          else:
            - script.execute: script_enter_deep_sleep

  # ==================== TCA8418 GPI BUTTONS ====================
  # Using TCA8418 in GPI mode (individual GPIO pins, not keypad matrix)
  # Keys 97-104 = ROW0-ROW7 pins, Keys 105-114 = COL0-COL9 pins
  # Connect each button to a single GPI pin with pullup
  # Maximum 18 buttons (18 GPIO pins available)

  # ROW0 (key 97) - Page navigation: Previous
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row0
    key: 5
    name: "GPI ROW0 - Prev Page"
    on_press:
      - script.execute: script_prev_page

  # ROW1 (key 98) - Page navigation: Next
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row1
    key: 4
    name: "GPI ROW1 - Next Page"
    on_press:
      - script.execute: script_next_page

  # ROW2 (key 99) - Volume Up
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row2
    key: 2
    name: "GPI ROW2 - Volume Up"
    on_press:
      - script.execute: script_volume_up

  # ROW3 (key 100) - Volume Down
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row3
    key: 11
    name: "GPI ROW3 - Volume Down"
    on_press:
      - script.execute: script_volume_down

  # ROW4 (key 101) - Play/Pause
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row4
    key: 101
    name: "GPI ROW4 - Play/Pause"
    on_press:
      - script.execute: script_music_play_pause

  # ROW5 (key 102) - Skip Next
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row5
    key: 102
    name: "GPI ROW5 - Skip Next"
    on_press:
      - script.execute: script_music_next

  # ROW6 (key 103) - Skip Previous
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row6
    key: 103
    name: "GPI ROW6 - Skip Prev"
    on_press:
      - script.execute: script_music_prev

  # ROW7 (key 104) - Light Toggle
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_row7
    key: 104
    name: "GPI ROW7 - Light Toggle"
    on_press:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: ${light_entity}

  # COL0 (key 105) - Automation 1
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col0
    key: 105
    name: "GPI COL0 - Automation 1"
    on_press:
      - homeassistant.service:
          service: ${automation_row1_btn1}

  # COL1 (key 106) - Automation 2
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col1
    key: 106
    name: "GPI COL1 - Automation 2"
    on_press:
      - homeassistant.service:
          service: ${automation_row1_btn4}

  # COL2 (key 107) - Automation 3
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col2
    key: 107
    name: "GPI COL2 - Automation 3"
    on_press:
      - homeassistant.service:
          service: ${automation_row2_btn1}

  # COL3 (key 108) - Automation 4
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col3
    key: 108
    name: "GPI COL3 - Automation 4"
    on_press:
      - homeassistant.service:
          service: ${automation_row2_btn4}

  # COL4 (key 109) - Automation 5
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col4
    key: 100
    name: "GPI COL4 - Automation 5"
    on_press:
      - homeassistant.service:
          service: ${automation_row4_btn1}

  # COL5 (key 110) - Automation 6
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col5
    key: 99
    name: "GPI COL5 - Automation 6"
    on_press:
      - homeassistant.service:
          service: ${automation_row4_btn4}

  # COL6 (key 111) - Climate Off
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col6
    key: 97
    name: "GPI COL6 - Climate Off"
    on_press:
      - homeassistant.service:
          service: climate.turn_off
          data:
            entity_id: ${climate_entity}

  # COL7 (key 112) - Climate Cool
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col7
    key: 98
    name: "GPI COL7 - Climate Cool"
    on_press:
      - homeassistant.service:
          service: climate.set_hvac_mode
          data:
            entity_id: ${climate_entity}
            hvac_mode: cool

  # COL8 (key 113) - Climate Heat
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col8
    key: 99
    name: "GPI COL8 - Climate Heat"
    on_press:
      - homeassistant.service:
          service: climate.set_hvac_mode
          data:
            entity_id: ${climate_entity}
            hvac_mode: heat

  # COL9 (key 114) - Spare
  - platform: tca8418
    tca8418_id: keypad
    id: btn_gpi_col9
    key: 102
    name: "Power"

globals:
  - id: music_playing
    type: bool
    initial_value: "false"
  - id: current_page
    type: int
    initial_value: "0"
  - id: touch_x_start
    type: int
    initial_value: "0"
  - id: touch_y_start
    type: int
    initial_value: "0"
  - id: touch_x_end
    type: int
    initial_value: "0"
  - id: touch_y_end
    type: int
    initial_value: "0"
  # Playlist storage (max 20 playlists)
  - id: playlist_names
    type: std::vector<std::string>
  - id: playlist_uris
    type: std::vector<std::string>
  - id: selected_playlist_idx
    type: int
    initial_value: "0"
  - id: playlists_loaded
    type: bool
    initial_value: "false"
  # Device sleep state tracking
  - id: device_sleeping
    type: bool
    initial_value: "false"

script:

  # Deep sleep script
  - id: script_enter_deep_sleep
    then:
      - logger.log: "Entering deep sleep..."
      - globals.set:
          id: device_sleeping
          value: 'true'
      # Turn off the backlight before sleeping
      - light.turn_off: back_light
      # Small delay to ensure everything is ready
      - delay: 100ms
      # Enter deep sleep
      - deep_sleep.enter: deep_sleep_ctrl

  # Wake device script (called by power button or motion)
  - id: script_wake_device
    then:
      - logger.log: "Waking device..."
      - globals.set:
          id: device_sleeping
          value: 'false'
      - light.turn_on: back_light
      - lvgl.resume:
      - lvgl.widget.redraw:

  # Volume up script for Music Assistant
  - id: script_volume_up
    then:
      - logger.log: "Volume Up"
      - lambda: |-
          int current_vol = (int)(id(music_volume).state * 100);
          int new_vol = std::min(100, current_vol + 5);
          id(script_music_volume).execute(new_vol);

  # Volume down script for Music Assistant
  - id: script_volume_down
    then:
      - logger.log: "Volume Down"
      - lambda: |-
          int current_vol = (int)(id(music_volume).state * 100);
          int new_vol = std::max(0, current_vol - 5);
          id(script_music_volume).execute(new_vol);

  # Page navigation scripts
  - id: script_next_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 1) % 4;'
      - lvgl.page.next:
          animation: MOVE_LEFT
          time: 300ms

  - id: script_prev_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 3) % 4;'
      - lvgl.page.previous:
          animation: MOVE_RIGHT
          time: 300ms

  # Music Assistant API scripts
  - id: script_music_play_pause
    then:
      - if:
          condition:
            lambda: 'return id(music_playing);'
          then:
            - http_request.post:
                url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  return "{\"command\":\"player_queues/pause\",\"args\":{\"queue_id\":\"${ma_player}\"}}";
          else:
            - http_request.post:
                url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  return "{\"command\":\"player_queues/play\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_next
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            return "{\"command\":\"player_queues/next\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_prev
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            return "{\"command\":\"player_queues/previous\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_volume
    parameters:
      volume: int
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            char buf[256];
            snprintf(buf, sizeof(buf), "{\"command\":\"players/cmd/volume_set\",\"args\":{\"player_id\":\"${ma_player}\",\"volume_level\":%d}}", volume);
            return std::string(buf);

  # TV IR scripts (placeholder codes - update with your TV's codes)

  # App launch scripts (placeholder - update with your TV's app launch IR codes or HA service calls)
  - id: script_launch_jellyfin
    then:
      - logger.log: "Launching Jellyfin"
      # Option 1: IR codes for app selection
      # - remote_transmitter.transmit_nec:
      #     address: 0x0000
      #     command: 0x0000
      # Option 2: Home Assistant service call
      # - homeassistant.service:
      #     service: media_player.select_source
      #     data:
      #       entity_id: ${tv_media_player}
      #       source: "Jellyfin"

  - id: script_launch_prime
    then:
      - logger.log: "Launching Prime Video"

  - id: script_launch_netflix
    then:
      - logger.log: "Launching Netflix"

  - id: script_launch_hbo
    then:
      - logger.log: "Launching HBO"

  # Playlist scripts
  - id: script_fetch_playlists
    then:
      - logger.log: "Fetching playlists from Music Assistant"
      - http_request.post:
          url: "http://${ma_host}:${ma_port}/api"
          capture_response: true
          max_response_buffer_size: 2048
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: '{"command":"music/playlists/library_items","args":{"limit":20}}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    // Clear existing playlists
                    id(playlist_names).clear();
                    id(playlist_uris).clear();

                    // Store body for parsing
                    std::string response_body = body;

                    // Log success
                    ESP_LOGD("playlists", "Received response: %d bytes", response_body.length());

                    // TODO: Implement proper JSON parsing
                    // For now, set some test playlists
                    id(playlist_names).push_back("Playlist 1");
                    id(playlist_names).push_back("Playlist 2");
                    id(playlist_names).push_back("Playlist 3");
                    id(playlist_uris).push_back("library://playlist/1");
                    id(playlist_uris).push_back("library://playlist/2");
                    id(playlist_uris).push_back("library://playlist/3");
                    id(playlists_loaded) = true;

                    ESP_LOGI("playlists", "Loaded %d playlists", id(playlist_names).size());
                  } else {
                    ESP_LOGE("playlists", "Failed to fetch playlists: %d", response->status_code);
                  }

  - id: script_play_selected_playlist
    then:
      - if:
          condition:
            lambda: 'return id(playlists_loaded) && id(selected_playlist_idx) < id(playlist_uris).size();'
          then:
            - lambda: |-
                std::string uri = id(playlist_uris)[id(selected_playlist_idx)];
                ESP_LOGD("playlists", "Playing playlist: %s", uri.c_str());
            - http_request.post:
                url: "http://${ma_host}:${ma_port}/api"
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  std::string uri = id(playlist_uris)[id(selected_playlist_idx)];
                  char buf[512];
                  snprintf(buf, sizeof(buf),
                    "{\"command\":\"player_queues/play_media\",\"args\":{\"queue_id\":\"${ma_player}\",\"media\":\"%s\",\"option\":\"replace\"}}",
                    uri.c_str());
                  return std::string(buf);


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.widget.update: 
        id: lbl_wifi_room
        text_color: 0xFFFFFF
  on_disconnect:
    - lvgl.widget.update: 
        id: lbl_wifi_room
        text_color: 0xFF0000

web_server:
  port: 80

psram:
  mode: quad
  speed: 80MHz

http_request:
  useragent: esphome/omote
  timeout: 10s

online_image:
  - id: album_art
    url: "https://via.placeholder.com/100"
    format: PNG
    type: RGB565
    resize: 100x100
    on_download_finished:
      - lvgl.image.update:
          id: img_album_art
          src: album_art

i2c:
  sda: GPIO20
  scl: GPIO19
  frequency: 400kHz
  # Expected devices: 0x38 (FT63X6 touchscreen), 0x34 (TCA8418 keypad), 0x6B (IMU)
  sda_pullup_enabled: False
  scl_pullup_enabled: False
  scan: true

# TCA8418 I2C GPIO Expander (GPI mode, not keypad matrix)
# Keys 97-104 = ROW0-ROW7, Keys 105-114 = COL0-COL9
tca8418:
  - id: keypad
    address: 0x34
    interrupt_pin: GPIO08

# IMU sensor for motion wake detection (QMI8658 on Omote)
# Used to wake device when picked up

output:
  # LCD Backlight GPIO
  - platform: ledc
    id: gpio_09
    pin:
      number: GPIO09
      inverted: true
  # Keypad Backlight GPIO
  - platform: ledc
    id: gpio_46
    pin:
      number: GPIO46
      inverted: False
  - platform: gpio
    # lcd_rd pin needs to be set HIGH before LCD will work.
    # Set HIGH (turn off) with boot priority in esphome section.
    id: lcd_rd
    pin:
      number: GPIO42
      inverted: True

light:
  - platform: monochromatic
    id: back_light
    output: gpio_09
    restore_mode: RESTORE_DEFAULT_ON
    name: "LCD Backlight"
  - platform: monochromatic
    output: gpio_46
    restore_mode: RESTORE_DEFAULT_OFF
    name: "Keypad Backlight"


touchscreen:
  - platform: ft63x6
    id: my_touch
    display: LCD
    address: 0x38
    calibration:
      x_min: 0
      x_max: 237
      y_min: 0
      y_max: 319
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lvgl.resume:
              - lvgl.widget.redraw:

spi:
  - id: quad_spi_bus
    type: octal
    clk_pin:
      number: GPIO41
    data_pins:
      - GPIO48
      - GPIO47
      - GPIO21
      - GPIO14
      - GPIO13
      - GPIO12
      - GPIO11
      - GPIO10

display:
  - platform: mipi_spi
    id: LCD
    model: ILI9341
    bus_mode: octal
    dc_pin: GPIO40
    cs_pin: GPIO39
    enable_pin:
      number: GPIO38
      inverted: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_20
    size: 20
    bpp: 4
    glyphs:
      - "\U000F092F"  # mdi:wifi
      - "\U000F0238"  # mdi:thermometer
      - "\U000F0335"  # mdi:lightbulb
      - "\U000F0336"  # mdi:lightbulb-outline
      - "\U000F0054"  # mdi:air-conditioner
      - "\U000F0F55"  # mdi:snowflake (cool)
      - "\U000F0210"  # mdi:fan
      - "\U000F0E4B"  # mdi:fire (heat)
      - "\U000F0425"  # mdi:power
      - "\U000F0AE4"  # mdi:blinds
      - "\U000F040A"  # mdi:play
      - "\U000F03E4"  # mdi:pause
      - "\U000F04AD"  # mdi:skip-next
      - "\U000F04AE"  # mdi:skip-previous
      - "\U000F057E"  # mdi:volume-high
      - "\U000F0580"  # mdi:volume-medium
      - "\U000F0581"  # mdi:volume-off
      - "\U000F0532"  # mdi:television
      - "\U000F0415"  # mdi:plus
      - "\U000F0374"  # mdi:minus
      - "\U000F0450"  # mdi:refresh
      - "\U000F0411"  # mdi:playlist-music
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_36
    size: 36
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi:play
      - "\U000F03E4"  # mdi:pause
      - "\U000F04AD"  # mdi:skip-next
      - "\U000F04AE"  # mdi:skip-previous
      - "\U000F0238"  # mdi:thermometer
  - file: "gfonts://Roboto"
    id: roboto_14
    size: 10
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_18
    size: 18
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
    bpp: 4

lvgl:
  displays:
    - LCD
  touchscreens:
    - my_touch
  buffer_size: 25%
  on_idle:
    timeout: 30s
    then:
      - logger.log: "LVGL idle"
  pages:
    # ==================== PAGE 1: ROOM CONTROL ====================
    - id: room_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # WiFi indicator (top right)
        - label:
            id: lbl_wifi_room
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F092F"
            text_color: 0xFF0000
        # Temperature display section
        - obj:
            x: 10
            y: 10
            width: 220
            height: 60
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 15
                  text_font: mdi_36
                  text: "\U000F0238"
                  text_color: 0x4FC3F7
              - label:
                  id: lbl_temperature
                  x: 60
                  y: 10
                  width: 150
                  text_font: roboto_24
                  text: "--.-°C"
                  text_color: 0xFFFFFF
        # Climate card section
        - obj:
            x: 10
            y: 75
            width: 220
            height: 145
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 5
                  text_font: mdi_20
                  text: "\U000F0054"
                  text_color: 0x4FC3F7
              - label:
                  x: 40
                  y: 8
                  text_font: roboto_14
                  text: "AC"
                  text_color: 0xAAAAAA
              - label:
                  id: lbl_target_temp
                  x: 140
                  y: 5
                  width: 70
                  text_font: roboto_24
                  text: "--°C"
                  text_color: 0xFFFFFF
                  text_align: right
              - label:
                  id: lbl_climate_mode
                  x: 10
                  y: 30
                  width: 100
                  text_font: roboto_14
                  text: "off"
                  text_color: 0x888888
              # Mode buttons row
              # Off button
              - button:
                  id: btn_climate_off
                  x: 10
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0425"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.turn_off
                        data:
                          entity_id: ${climate_entity}
              # Cool button
              - button:
                  id: btn_climate_cool
                  x: 80
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0F55"
                        text_color: 0x4FC3F7
                  on_click:
                    - homeassistant.service:
                        service: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: cool
              # Heat button
              - button:
                  id: btn_climate_heat
                  x: 150
                  y: 50
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0E4B"
                        text_color: 0xFF5722
                  on_click:
                    - homeassistant.service:
                        service: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: heat
              # Temperature decrease button
              - button:
                  id: btn_temp_down
                  x: 10
                  y: 95
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0374"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${climate_entity}
                          temperature: !lambda 'return id(climate_target_temp).state - 1;'
              # Temperature increase button
              - button:
                  id: btn_temp_up
                  x: 150
                  y: 95
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 8
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0415"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: ${climate_entity}
                          temperature: !lambda 'return id(climate_target_temp).state + 1;'
        # Light control section
        - obj:
            x: 10
            y: 225
            width: 220
            height: 45
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 10
                  text_font: mdi_20
                  text: "\U000F0335"
                  text_color: 0xFFCC00
              - label:
                  x: 40
                  y: 12
                  text_font: roboto_14
                  text: "Room Light"
                  text_color: 0xFFFFFF
              - button:
                  id: btn_light
                  x: 150
                  y: 5
                  width: 60
                  height: 35
                  bg_color: 0x333333
                  radius: 17
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0425"
                        text_color: 0xFFFFFF
                  on_click:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: ${light_entity}
        # Blinds control section - Combined
        - obj:
            x: 10
            y: 275
            width: 220
            height: 40
            bg_color: 0x1a1a2e
            radius: 8
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 5
                  y: 10
                  text_font: mdi_20
                  text: "\U000F0AE4"
                  text_color: 0x81D4FA
              # Left slider
              - label:
                  x: 30
                  y: 3
                  text_font: roboto_14
                  text: "L"
                  text_color: 0x888888
              - slider:
                  id: slider_blinds_left
                  x: 30
                  y: 18
                  width: 70
                  height: 12
                  min_value: 0
                  max_value: 100
                  value: 0
                  bg_color: 0x333333
                  indicator:
                    bg_color: 0x81D4FA
                  knob:
                    bg_color: 0xFFFFFF
                  on_release:
                    - homeassistant.service:
                        service: cover.set_cover_position
                        data:
                          entity_id: ${cover_entity_left}
                          position: !lambda 'return (int)x;'
              - label:
                  id: lbl_blinds_left_pct
                  x: 100
                  y: 12
                  width: 25
                  text_font: roboto_14
                  text: "0%"
                  text_color: 0xAAAAAA
              # Right slider
              - label:
                  x: 130
                  y: 3
                  text_font: roboto_14
                  text: "R"
                  text_color: 0x888888
              - slider:
                  id: slider_blinds_right
                  x: 130
                  y: 18
                  width: 70
                  height: 12
                  min_value: 0
                  max_value: 100
                  value: 0
                  bg_color: 0x333333
                  indicator:
                    bg_color: 0x81D4FA
                  knob:
                    bg_color: 0xFFFFFF
                  on_release:
                    - homeassistant.service:
                        service: cover.set_cover_position
                        data:
                          entity_id: ${cover_entity_right}
                          position: !lambda 'return (int)x;'
              - label:
                  id: lbl_blinds_right_pct
                  x: 200
                  y: 12
                  width: 25
                  text_font: roboto_14
                  text: "0%"
                  text_color: 0xAAAAAA

    # ==================== PAGE 2: MUSIC ====================
    - id: music_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      on_load:
        - if:
            condition:
              lambda: 'return !id(playlists_loaded);'
            then:
              - script.execute: script_fetch_playlists
      widgets:
        # WiFi indicator
        - label:
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F092F"
            text_color: 0xFF0000
        # Album art container (smaller, on left)
        - obj:
            x: 10
            y: 10
            width: 80
            height: 80
            bg_color: 0x222222
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - image:
                  id: img_album_art
                  x: 0
                  y: 0
                  src: album_art
        # Track title (right of album art)
        - label:
            id: lbl_music_title
            x: 100
            y: 20
            width: 130
            height: 25
            text_font: roboto_18
            text: "No track"
            text_color: 0xFFFFFF
            long_mode: dot
        # Artist name
        - label:
            id: lbl_music_artist
            x: 100
            y: 45
            width: 130
            height: 20
            text_font: roboto_14
            text: ""
            text_color: 0x888888
            long_mode: dot
        # Transport controls container
        - obj:
            x: 30
            y: 95
            width: 180
            height: 60
            bg_opa: TRANSP
            scrollbar_mode: "off"
            widgets:
              # Previous button
              - button:
                  id: btn_prev
                  x: 0
                  y: 5
                  width: 50
                  height: 50
                  bg_color: 0x333333
                  radius: 25
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_36
                        text: "\U000F04AE"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_music_prev
              # Play/Pause button
              - button:
                  id: btn_play_pause
                  x: 60
                  y: 0
                  width: 60
                  height: 60
                  bg_color: 0x1DB954
                  radius: 30
                  scrollable: false
                  widgets:
                    - label:
                        id: lbl_play_pause
                        align: center
                        text_font: mdi_36
                        text: "\U000F040A"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_music_play_pause
              # Next button
              - button:
                  id: btn_next
                  x: 130
                  y: 5
                  width: 50
                  height: 50
                  bg_color: 0x333333
                  radius: 25
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_36
                        text: "\U000F04AD"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_music_next
        # Volume control
        - obj:
            x: 10
            y: 160
            width: 220
            height: 40
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 10
                  text_font: mdi_20
                  text: "\U000F057E"
                  text_color: 0x1DB954
              - slider:
                  id: slider_volume
                  x: 40
                  y: 12
                  width: 170
                  height: 15
                  min_value: 0
                  max_value: 100
                  value: 50
                  bg_color: 0x333333
                  indicator:
                    bg_color: 0x1DB954
                  knob:
                    bg_color: 0xFFFFFF
                  on_release:
                    - script.execute:
                        id: script_music_volume
                        volume: !lambda 'return (int)x;'
        # Playlist section
        - obj:
            x: 10
            y: 205
            width: 220
            height: 110
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 5
                  text_font: roboto_14
                  text: "Playlists"
                  text_color: 0x888888
              # Refresh button
              - button:
                  id: btn_refresh_playlists
                  x: 180
                  y: 2
                  width: 30
                  height: 20
                  bg_color: 0x333333
                  radius: 5
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0450"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_fetch_playlists
              # Playlist roller
              - roller:
                  id: roller_playlists
                  x: 10
                  y: 25
                  width: 200
                  height: 55
                  options:
                    - "Playlist 1"
                    - "Playlist 2"
                    - "Playlist 3"
                  visible_row_count: 3
                  selected:
                    bg_color: 0x1DB954
                    text_color: 0xFFFFFF
                  on_value:
                    - globals.set:
                        id: selected_playlist_idx
                        value: !lambda 'return x;'
              # Play playlist button
              - button:
                  id: btn_play_playlist
                  x: 50
                  y: 85
                  width: 120
                  height: 25
                  bg_color: 0x1DB954
                  radius: 12
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: roboto_14
                        text: "Play Playlist"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_play_selected_playlist

    # ==================== PAGE 3: TV ====================
    - id: tv_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # WiFi indicator
        - label:
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F092F"
            text_color: 0xFF0000
        # TV Power section
        - obj:
            x: 10
            y: 10
            width: 220
            height: 55
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 15
                  text_font: mdi_20
                  text: "\U000F0532"
                  text_color: 0xFF5722
              - label:
                  x: 40
                  y: 17
                  text_font: roboto_14
                  text: "TV Power"
                  text_color: 0xFFFFFF
              - button:
                  id: btn_tv_power
                  x: 150
                  y: 8
                  width: 60
                  height: 40
                  bg_color: 0xFF5722
                  radius: 20
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_20
                        text: "\U000F0425"
                        text_color: 0xFFFFFF
        # Now Playing section
        - obj:
            x: 10
            y: 75
            width: 220
            height: 70
            bg_color: 0x1a1a2e
            radius: 10
            scrollbar_mode: "off"
            widgets:
              - label:
                  x: 10
                  y: 8
                  text_font: roboto_14
                  text: "Now Playing:"
                  text_color: 0x888888
              - label:
                  id: lbl_tv_title
                  x: 10
                  y: 28
                  width: 200
                  text_font: roboto_18
                  text: "Nothing playing"
                  text_color: 0xFFFFFF
                  long_mode: dot
              - label:
                  id: lbl_tv_artist
                  x: 10
                  y: 50
                  width: 200
                  text_font: roboto_14
                  text: ""
                  text_color: 0x888888
                  long_mode: dot
        # App launch buttons - Row 1
        - obj:
            x: 10
            y: 155
            width: 220
            height: 160
            bg_opa: TRANSP
            scrollbar_mode: "off"
            widgets:
              # Jellyfin button
              - button:
                  id: btn_jellyfin
                  x: 5
                  y: 0
                  width: 100
                  height: 75
                  bg_color: 0x00A4DC
                  radius: 12
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: roboto_18
                        text: "Jellyfin"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_launch_jellyfin
              # Prime Video button
              - button:
                  id: btn_prime
                  x: 115
                  y: 0
                  width: 100
                  height: 75
                  bg_color: 0x00A8E1
                  radius: 12
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: roboto_18
                        text: "Prime"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_launch_prime
              # Netflix button
              - button:
                  id: btn_netflix
                  x: 5
                  y: 82
                  width: 100
                  height: 75
                  bg_color: 0xE50914
                  radius: 12
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: roboto_18
                        text: "Netflix"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_launch_netflix
              # HBO button
              - button:
                  id: btn_hbo
                  x: 115
                  y: 82
                  width: 100
                  height: 75
                  bg_color: 0x5822B4
                  radius: 12
                  scrollable: false
                  widgets:
                    - label:
                        align: center
                        text_font: roboto_18
                        text: "HBO"
                        text_color: 0xFFFFFF
                  on_click:
                    - script.execute: script_launch_hbo

   
switch:
  # IR Receiver power
  - platform: gpio
    name: "IR Receiver Power"
    pin:
      number: GPIO06
    restore_mode: ALWAYS_OFF

remote_receiver:
  pin:
    number: GPIO04
  dump: all
  use_dma: True

remote_transmitter:
  pin:
    number: GPIO05
    inverted: True
  carrier_duty_percent: 50%
  use_dma: True
