lvgl:
  displays:
    - LCD
  touchscreens:
    - my_touch
  buffer_size: 10%  # Reduced from 25% to help with memory pressure
  on_idle:
    timeout: 120s
    then:
      - logger.log: "LVGL idle - 2 minutes of inactivity"
      - if:
          condition:
            lambda: 'return id(is_nighttime);'
          then:
            - logger.log: "Nighttime - turning off backlight"
            - light.turn_off: back_light
  pages:
    # ==================== PAGE 1: ROOM CONTROL ====================
    - id: room_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # ===== TOP STATUS BAR =====
        # Weather icon (left)
        - label:
            id: lbl_weather_room
            x: 5
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0599"
            text_color: 0xFFCC00
        # Outdoor temperature
        - label:
            id: lbl_outdoor_temp_room
            x: 28
            y: 7
            width: 40
            text_font: roboto_12
            text: "--°"
            text_color: 0x333333
        # Time (center)
        - label:
            id: lbl_time_room
            x: 95
            y: 5
            width: 50
            text_font: roboto_14
            text: "--:--"
            text_color: 0x333333
            text_align: center
        # WiFi indicator (right)
        - label:
            id: lbl_wifi_room
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0928"
            text_color: 0x00AA00

        # ===== INDOOR TEMPERATURE (large, centered) =====
        - label:
            x: 10
            y: 35
            text_font: mdi_36
            text: "\U000F0238"
            text_color: 0x4FC3F7
        - label:
            id: lbl_temperature
            x: 55
            y: 35
            width: 180
            text_font: roboto_24
            text: "--.-°C"
            text_color: 0x4FC3F7

        # ===== AC CONTROLS =====
        # Target temp display
        - label:
            id: lbl_target_temp
            x: 10
            y: 70
            width: 60
            text_font: roboto_18
            text: "--°C"
            text_color: 0x4FC3F7
        - label:
            id: lbl_climate_mode
            x: 75
            y: 73
            width: 50
            text_font: roboto_12
            text: "off"
            text_color: 0x888888
        # AC Mode buttons row
        - button:
            id: btn_climate_off
            x: 10
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0425"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
                  service: climate.turn_off
                  data:
                    entity_id: ${climate_entity}
        - button:
            id: btn_climate_cool
            x: 60
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0F55"
                  text_color: 0x4FC3F7
            on_click:
              - homeassistant.service:
                  service: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: cool
        - button:
            id: btn_climate_heat
            x: 110
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0E4B"
                  text_color: 0xFF5722
            on_click:
              - homeassistant.service:
                  service: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: heat
        # Temp +/- buttons
        - button:
            id: btn_temp_down
            x: 165
            y: 95
            width: 35
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0374"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
