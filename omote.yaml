switch:
  # IR Receiver power
  - platform: gpio
    name: "IR Receiver Power"
    pin:
      number: GPIO06
    restore_mode: ALWAYS_OFF

remote_receiver:
  pin:
    number: GPIO04
  dump: all
  use_dma: True

remote_transmitter:
  id: IR_TX
  pin:
    number: GPIO05
    inverted: True
  carrier_duty_percent: 50%
  use_dma: True
  non_blocking: true