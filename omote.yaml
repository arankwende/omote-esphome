      - "\U000F04AD"  # mdi:skip-next
      - "\U000F04AE"  # mdi:skip-previous
      - "\U000F0238"  # mdi:thermometer
  - file: "gfonts://Roboto"
    id: roboto_12
    size: 12
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_14
    size: 14
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_18
    size: 18
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
    bpp: 4

lvgl:
  displays:
    - LCD
  touchscreens:
    - my_touch
  buffer_size: 10%  # Reduced from 25% to help with memory pressure
  on_idle:
    timeout: 120s
    then:
      - logger.log: "LVGL idle - 2 minutes of inactivity"
 #     - if:
 #         condition:
 #           lambda: 'return id(is_nighttime);'
 #         then:
 #           - logger.log: "Nighttime - turning off backlight"
 #           - light.turn_off: back_light
  pages:
    # ==================== PAGE 1: ROOM CONTROL ====================
    - id: room_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # ===== TOP STATUS BAR =====
        # Weather icon (left)
        - label:
            id: lbl_weather_room
            x: 5
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0599"
            text_color: 0xFFCC00
        # Outdoor temperature
        - label:
            id: lbl_outdoor_temp_room
            x: 28
            y: 7
            width: 40
            text_font: roboto_12
            text: "--°"
            text_color: 0x333333
        # Time (center)
        - label:
            id: lbl_time_room
            x: 95
            y: 5
            width: 50
            text_font: roboto_14
            text: "--:--"
            text_color: 0x333333
            text_align: center
        # WiFi indicator (right)
        - label:
            id: lbl_wifi_room
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0928"
            text_color: 0x00AA00

        # ===== INDOOR TEMPERATURE (large, centered) =====
        - label:
            x: 10
            y: 35
            text_font: mdi_36
            text: "\U000F0238"
            text_color: 0x4FC3F7
        - label:
            id: lbl_temperature
            x: 55
            y: 35
            width: 180
            text_font: roboto_24
            text: "--.-°C"
            text_color: 0xFFFFFF

        # ===== AC CONTROLS =====
        # Target temp display
        - label:
            id: lbl_target_temp
            x: 10
            y: 70
            width: 60
            text_font: roboto_18
            text: "--°C"
            text_color: 0x4FC3F7
        - label:
            id: lbl_climate_mode
            x: 75
            y: 73
            width: 50
            text_font: roboto_12
            text: "off"
            text_color: 0x888888
        # AC Mode buttons row
        - button:
            id: btn_climate_off
            x: 10
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0425"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
                  service: climate.turn_off
                  data:
                    entity_id: ${climate_entity}
        - button:
            id: btn_climate_cool
            x: 60
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0F55"
                  text_color: 0x4FC3F7
            on_click:
              - homeassistant.service:
                  service: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: cool
        - button:
            id: btn_climate_heat
            x: 110
            y: 95
            width: 45
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0E4B"
                  text_color: 0xFF5722
            on_click:
              - homeassistant.service:
                  service: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: heat
        # Temp +/- buttons
        - button:
            id: btn_temp_down
            x: 165
            y: 95
            width: 35
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0374"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: ${climate_entity}
                    temperature: !lambda 'return id(climate_target_temp).state - 1;'
        - button:
            id: btn_temp_up
            x: 205
            y: 95
            width: 35
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0415"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
                  service: climate.set_temperature
                  data:
                    entity_id: ${climate_entity}
                    temperature: !lambda 'return id(climate_target_temp).state + 1;'

        # ===== LIGHT TOGGLE (large button) =====
        - button:
            id: btn_light
            x: 10
            y: 145
            width: 220
            height: 50
            bg_color: 0x333333
            radius: 10
            scrollable: false
            widgets:
              - label:
                  x: 15
                  y: 12
                  text_font: mdi_20
                  text: "\U000F0335"
                  text_color: 0xFFCC00
              - label:
                  x: 45
                  y: 15
                  text_font: roboto_14
                  text: "Room Light"
                  text_color: 0xFFFFFF
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: ${light_entity}

        # ===== BLINDS CONTROLS (buttons that open slider popup) =====
        # Left blinds button
        - button:
            id: btn_blinds_left
            x: 10
            y: 205
            width: 105
            height: 55
            bg_color: 0x333333
            radius: 10
            scrollable: false
            widgets:
              - label:
                  x: 10
                  y: 8
                  text_font: mdi_20
                  text: "\U000F0AE4"
                  text_color: 0x81D4FA
              - label:
                  x: 38
                  y: 10
                  text_font: roboto_14
                  text: "Left"
                  text_color: 0xFFFFFF
              - label:
                  id: lbl_blinds_left_pct
                  x: 38
                  y: 28
                  width: 50
                  text_font: roboto_12
                  text: "0%"
                  text_color: 0x81D4FA
            on_click:
              - lvgl.widget.show: blinds_popup
              - lvgl.slider.update:
                  id: slider_blinds_left
                  value: !lambda 'return (int)id(blinds_position_left).state;'
              - lvgl.slider.update:
                  id: slider_blinds_right
                  value: !lambda 'return (int)id(blinds_position_right).state;'
        # Right blinds button
        - button:
            id: btn_blinds_right
            x: 125
            y: 205
            width: 105
            height: 55
            bg_color: 0x333333
            radius: 10
            scrollable: false
            widgets:
              - label:
                  x: 10
                  y: 8
                  text_font: mdi_20
                  text: "\U000F0AE4"
                  text_color: 0x81D4FA
              - label:
                  x: 38
                  y: 10
                  text_font: roboto_14
                  text: "Right"
                  text_color: 0xFFFFFF
              - label:
                  id: lbl_blinds_right_pct
                  x: 38
                  y: 28
                  width: 50
                  text_font: roboto_12
                  text: "0%"
                  text_color: 0x81D4FA
            on_click:
              - lvgl.widget.show: blinds_popup
              - lvgl.slider.update:
                  id: slider_blinds_left
                  value: !lambda 'return (int)id(blinds_position_left).state;'
              - lvgl.slider.update:
                  id: slider_blinds_right
                  value: !lambda 'return (int)id(blinds_position_right).state;'

        # ===== BLINDS SLIDER POPUP (hidden by default) =====
        - obj:
            id: blinds_popup
            x: 0
            y: 0
            width: 240
            height: 320
            bg_color: 0x000000
            bg_opa: 90%
            hidden: true
            widgets:
              # Popup container
              - obj:
                  x: 20
                  y: 60
                  width: 200
                  height: 200
                  bg_color: 0x222222
                  radius: 15
                  widgets:
                    # Title
                    - label:
                        x: 0
                        y: 10
                        width: 200
                        text_font: roboto_18
                        text: "Blinds Control"
                        text_color: 0xFFFFFF
                        text_align: center
                    # Close button
                    - button:
                        id: btn_blinds_popup_close
                        x: 160
                        y: 5
                        width: 35
                        height: 35
                        bg_color: 0x444444
                        radius: 17
                        scrollable: false
                        widgets:
                          - label:
                              align: center
                              text_font: roboto_18
                              text: "X"
                              text_color: 0xFFFFFF
                        on_click:
                          - lvgl.widget.hide: blinds_popup
                    # Left blinds slider section
                    - label:
                        x: 10
                        y: 50
                        text_font: roboto_14
                        text: "Left"
                        text_color: 0x888888
                    - slider:
                        id: slider_blinds_left
                        x: 50
                        y: 50
                        width: 140
                        height: 25
                        min_value: 0
                        max_value: 100
                        value: 0
                        bg_color: 0x444444
                        indicator:
                          bg_color: 0x81D4FA
                        knob:
                          bg_color: 0x81D4FA
                          radius: 12
                        on_release:
                          - homeassistant.service:
                              service: cover.set_cover_position
                              data:
                                entity_id: ${cover_entity_left}
                                position: !lambda 'return (int)x;'
                    # Right blinds slider section
                    - label:
                        x: 10
                        y: 95
                        text_font: roboto_14
                        text: "Right"
                        text_color: 0x888888
                    - slider:
                        id: slider_blinds_right
                        x: 50
                        y: 95
                        width: 140
                        height: 25
                        min_value: 0
                        max_value: 100
                        value: 0
                        bg_color: 0x444444
                        indicator:
                          bg_color: 0x81D4FA
                        knob:
                          bg_color: 0x81D4FA
                          radius: 12
                        on_release:
                          - homeassistant.service:
                              service: cover.set_cover_position
                              data:
                                entity_id: ${cover_entity_right}
                                position: !lambda 'return (int)x;'
                    # Quick buttons row
                    - button:
                        id: btn_blinds_open_all
                        x: 10
                        y: 140
                        width: 85
                        height: 40
                        bg_color: 0x333333
                        radius: 8
                        scrollable: false
                        widgets:
                          - label:
                              align: center
                              text_font: roboto_14
                              text: "Open All"
                              text_color: 0x81D4FA
                        on_click:
                          - homeassistant.service:
                              service: cover.open_cover
                              data:
                                entity_id: ${cover_entity_left}
                          - homeassistant.service:
                              service: cover.open_cover
                              data:
                                entity_id: ${cover_entity_right}
                          - lvgl.slider.update:
                              id: slider_blinds_left
                              value: 100
                          - lvgl.slider.update:
                              id: slider_blinds_right
                              value: 100
                    - button:
                        id: btn_blinds_close_all
                        x: 105
                        y: 140
                        width: 85
                        height: 40
                        bg_color: 0x333333
                        radius: 8
                        scrollable: false
                        widgets:
                          - label:
                              align: center
                              text_font: roboto_14
                              text: "Close All"
                              text_color: 0x81D4FA
                        on_click:
                          - homeassistant.service:
                              service: cover.close_cover
                              data:
                                entity_id: ${cover_entity_left}
                          - homeassistant.service:
                              service: cover.close_cover
                              data:
                                entity_id: ${cover_entity_right}
                          - lvgl.slider.update:
                              id: slider_blinds_left
                              value: 0
                          - lvgl.slider.update:
                              id: slider_blinds_right
                              value: 0

    # ==================== PAGE 2: MUSIC ====================
    - id: music_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      on_load:
        - if:
            condition:
              lambda: 'return !id(playlists_loaded);'
            then:
              - script.execute: script_fetch_playlists
      widgets:
        # ===== TOP STATUS BAR =====
        # Weather icon (left)
        - label:
            id: lbl_weather_music
            x: 5
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0599"
            text_color: 0xFFCC00
        # Outdoor temperature
        - label:
            id: lbl_outdoor_temp_music
            x: 28
            y: 7
            width: 40
            text_font: roboto_12
            text: "--°"
            text_color: 0x333333
        # Time (center)
        - label:
            id: lbl_time_music
            x: 95
            y: 5
            width: 50
            text_font: roboto_14
            text: "--:--"
            text_color: 0x333333
            text_align: center
        # WiFi indicator (right)
        - label:
            id: lbl_wifi_music
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0928"
            text_color: 0x00AA00

        # ===== ALBUM ART + TRACK INFO =====
        # Image disabled - online_image component disabled for debugging
        # - image:
        #     id: img_album_art
        #     x: 10
        #     y: 35
        #     src: album_art
        # Track title
        - label:
            id: lbl_music_title
            x: 120
            y: 45
            width: 115
            height: 25
            text_font: roboto_18
            text: "No track"
            text_color: 0xFFFFFF
            long_mode: dot
        # Artist name
        - label:
            id: lbl_music_artist
            x: 120
            y: 70
            width: 115
            height: 20
            text_font: roboto_14
            text: ""
            text_color: 0x888888
            long_mode: dot

        # ===== TRANSPORT CONTROLS =====
        # Previous button
        - button:
            id: btn_prev
            x: 30
            y: 140
            width: 50
            height: 50
            bg_color: 0x333333
            radius: 25
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_36
                  text: "\U000F04AE"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_music_prev
        # Play/Pause button
        - button:
            id: btn_play_pause
            x: 90
            y: 135
            width: 60
            height: 60
            bg_color: 0x1DB954
            radius: 30
            scrollable: false
            widgets:
              - label:
                  id: lbl_play_pause
                  align: center
                  text_font: mdi_36
                  text: "\U000F040A"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_music_play_pause
        # Next button
        - button:
            id: btn_next
            x: 160
            y: 140
            width: 50
            height: 50
            bg_color: 0x333333
            radius: 25
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_36
                  text: "\U000F04AD"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_music_next

        # ===== VOLUME BUTTONS (no slider) =====
        - label:
            x: 10
            y: 205
            text_font: mdi_20
            text: "\U000F057E"
            text_color: 0x1DB954
        # Volume down button
        - button:
            id: btn_vol_down
            x: 40
            y: 200
            width: 80
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0374"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_volume_down
        # Volume up button
        - button:
            id: btn_vol_up
            x: 130
            y: 200
            width: 80
            height: 40
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0415"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_volume_up

        # ===== PLAYLIST QUICK-PLAY =====
        - button:
            id: btn_play_playlist
            x: 10
            y: 255
            width: 220
            height: 45
            bg_color: 0x1DB954
            radius: 10
            scrollable: false
            widgets:
              - label:
                  x: 15
                  y: 12
                  text_font: mdi_20
                  text: "\U000F0411"
                  text_color: 0xFFFFFF
              - label:
                  x: 45
                  y: 13
                  text_font: roboto_14
                  text: "Play Playlist"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_play_selected_playlist

    # ==================== PAGE 3: TV ====================
    - id: tv_page
      on_swipe_left:
        - script.execute: script_next_page
      on_swipe_right:
        - script.execute: script_prev_page
      widgets:
        # ===== TOP STATUS BAR =====
        # Weather icon (left)
        - label:
            id: lbl_weather_tv
            x: 5
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0599"
            text_color: 0xFFCC00
        # Outdoor temperature
        - label:
            id: lbl_outdoor_temp_tv
            x: 28
            y: 7
            width: 40
            text_font: roboto_12
            text: "--°"
            text_color: 0x333333
        # Time (center)
        - label:
            id: lbl_time_tv
            x: 95
            y: 5
            width: 50
            text_font: roboto_14
            text: "--:--"
            text_color: 0x333333
            text_align: center
        # WiFi indicator (right)
        - label:
            id: lbl_wifi_tv
            x: 210
            y: 5
            width: 25
            height: 25
            text_font: mdi_20
            text: "\U000F0928"
            text_color: 0x00AA00

        # ===== TV POWER BUTTON =====
        - button:
            id: btn_tv_power
            x: 10
            y: 30
            width: 220
            height: 35
            bg_color: 0xFF5722
            radius: 8
            scrollable: false
            widgets:
              - label:
                  x: 10
                  y: 6
                  text_font: mdi_20
                  text: "\U000F0532"
                  text_color: 0xFFFFFF
              - label:
                  x: 38
                  y: 8
                  text_font: roboto_14
                  text: "TV Power"
                  text_color: 0xFFFFFF
              - label:
                  x: 185
                  y: 6
                  text_font: mdi_20
                  text: "\U000F0425"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_tv_power_toggle

        # ===== NOW PLAYING SECTION =====
        # TV Art image - disabled, online_image component disabled for debugging
        # - image:
        #     id: img_tv_art
        #     x: 10
        #     y: 70
        #     src: tv_art
        # Track info next to art
        - label:
            x: 100
            y: 70
            text_font: roboto_12
            text: "Now Playing:"
            text_color: 0x888888
        - label:
            id: lbl_tv_title
            x: 100
            y: 85
            width: 130
            text_font: roboto_14
            text: "Nothing playing"
            text_color: 0xFFFFFF
            long_mode: dot
        - label:
            id: lbl_tv_artist
            x: 100
            y: 102
            width: 130
            text_font: roboto_12
            text: ""
            text_color: 0x888888
            long_mode: dot
        # Transport controls under the art
        - button:
            id: btn_tv_prev
            x: 10
            y: 155
            width: 40
            height: 35
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F045F"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_tv_media_prev
        - button:
            id: btn_tv_play_pause
            x: 55
            y: 155
            width: 50
            height: 35
            bg_color: 0xFF5722
            radius: 8
            scrollable: false
            widgets:
              - label:
                  id: lbl_tv_play_pause
                  align: center
                  text_font: mdi_20
                  text: "\U000F040A"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_tv_media_play_pause
        - button:
            id: btn_tv_next
            x: 110
            y: 155
            width: 40
            height: 35
            bg_color: 0x333333
            radius: 8
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_20
                  text: "\U000F0211"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_tv_media_next

        # ===== APP BUTTONS GRID (smaller, 5 buttons) =====
        # Row 1: Jellyfin, Prime, Netflix
        - button:
            id: btn_jellyfin
            x: 10
            y: 200
            width: 70
            height: 50
            bg_color: 0x00A4DC
            radius: 10
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_40
                  text: "\U000F0B11"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_launch_jellyfin
        - button:
            id: btn_prime
            x: 85
            y: 200
            width: 70
            height: 50
            bg_color: 0x00A8E1
            radius: 10
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_40
                  text: "\U000F0AD4"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_launch_prime
        - button:
            id: btn_netflix
            x: 160
            y: 200
            width: 70
            height: 50
            bg_color: 0xE50914
            radius: 10
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_40
                  text: "\U000F0746"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_launch_netflix
        # Row 2: HBO, Disney+
        - button:
            id: btn_hbo
            x: 10
            y: 258
            width: 70
            height: 50
            bg_color: 0x5822B4
            radius: 10
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_40
                  text: "\U000F0B0F"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_launch_hbo
        - button:
            id: btn_disney
            x: 85
            y: 258
            width: 70
            height: 50
            bg_color: 0x113CCF
            radius: 10
            scrollable: false
            widgets:
              - label:
                  align: center
                  text_font: mdi_40
                  text: "\U000F0B05"
                  text_color: 0xFFFFFF
            on_click:
              - script.execute: script_launch_disney

switch:
  # IR Receiver power
  - platform: gpio
    name: "IR Receiver Power"
    pin:
      number: GPIO06
    restore_mode: ALWAYS_OFF

remote_receiver:
  pin:
    number: GPIO04
  dump: all
  use_dma: True

remote_transmitter:
  pin:
    number: GPIO05
    inverted: True
  carrier_duty_percent: 50%
  use_dma: True
  non_blocking: true