time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_time_room
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_time_music
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_time_tv
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");


#set up battery sensor (MAX17043/MAX17048 fuel gauge at I2C 0x36)
sensor:
  - platform: max17043
    battery_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    battery_level:
      id: battery_level
      name: "Battery Level"
    update_interval: 60s
  # Home Assistant sensors
  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_sensor_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_temperature
          text:
            format: "%.1f°C"
            args: ['x']
  - platform: homeassistant
    id: climate_target_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_target_temp
          text:
            format: "%.0f°C"
            args: ['x']
  - platform: homeassistant
    id: blinds_position_left
    entity_id: ${cover_entity_left}
    attribute: current_position
    on_value:
      - lvgl.label.update:
          id: lbl_blinds_left_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  - platform: homeassistant
    id: blinds_position_right
    entity_id: ${cover_entity_right}
    attribute: current_position
    on_value:
      - lvgl.label.update:
          id: lbl_blinds_right_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  # Outdoor temperature from weather entity
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_outdoor_temp_room
          text:
            format: "%.0f°"
            args: ['x']
      - lvgl.label.update:
          id: lbl_outdoor_temp_music
          text:
            format: "%.0f°"
            args: ['x']
      - lvgl.label.update:
          id: lbl_outdoor_temp_tv
          text:
            format: "%.0f°"
            args: ['x']
  - platform: homeassistant
    id: music_volume
    entity_id: media_player.${ma_player}
    attribute: volume_level
  # QMI8658 IMU sensor for motion wake detection
  # NOTE: Commented out - may cause boot loop if sensor not present
  # Uncomment after confirming device boots and IMU is detected on I2C scan
  # - platform: qmi8658
  #   address: 0x6B
  #   acceleration_x:
  #     id: accel_x
  #     internal: true
  #   acceleration_y:
  #     id: accel_y
  #     internal: true
  #   acceleration_z:
  #     id: accel_z
  #     internal: true
  #   gyroscope_x:
  #     id: gyro_x
  #     internal: true
  #   gyroscope_y:
  #     id: gyro_y
  #     internal: true
  #   gyroscope_z:
  #     id: gyro_z
  #     internal: true
  #   update_interval: 500ms

button:
  - platform: restart
    name: "Restart"
text_sensor:
  # Weather condition from weather entity
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    on_value:
      - lambda: |-
          // Map weather conditions to MDI icons
          std::string icon = "\U000F0599"; // default sunny
          if (x == "cloudy") icon = "\U000F0595";
          else if (x == "partlycloudy") icon = "\U000F067E";
          else if (x == "rainy") icon = "\U000F0598";
          else if (x == "pouring") icon = "\U000F0597";
          else if (x == "snowy") icon = "\U000F059D";
          else if (x == "fog") icon = "\U000F0591";
          else if (x == "windy") icon = "\U000F059E";
          else if (x == "lightning" || x == "lightning-rainy") icon = "\U000F0593";
          else if (x == "sunny" || x == "clear-night") icon = "\U000F0599";

          // Update all weather icons using LVGL C API
          lv_label_set_text(id(lbl_weather_room), icon.c_str());
          lv_label_set_text(id(lbl_weather_music), icon.c_str());
          lv_label_set_text(id(lbl_weather_tv), icon.c_str());
  # Climate state
  - platform: homeassistant
    id: climate_state
    entity_id: ${climate_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_climate_mode
          text: !lambda 'return x;'
  # Light state
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    on_value:
      - if:
          condition:
            lambda: 'return x == "on";'
          then:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0xFFCC00
          else:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0x333333
  # Music Assistant player info
  - platform: homeassistant
    id: music_title
    entity_id: media_player.${ma_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_music_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_artist
    entity_id: media_player.${ma_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_music_artist
          text: !lambda 'return x;'
  # TV media player info
  - platform: homeassistant
    id: tv_media_title
    entity_id: ${tv_media_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_tv_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: tv_media_artist
    entity_id: ${tv_media_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_tv_artist
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_state
    entity_id: media_player.${ma_player}
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F03E4"
            - globals.set:
                id: music_playing
                value: 'true'
          else:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F040A"
            - globals.set:
                id: music_playing
                value: 'false'
  - platform: homeassistant
    id: music_album_art
    entity_id: media_player.${ma_player}
    attribute: entity_picture
    # on_value disabled - online_image component disabled for debugging
    # on_value:
    #   - if:
    #       condition:
    #         lambda: 'return !x.empty();'
    #       then:
    #         - online_image.set_url:
    #             id: album_art
    #             url: !lambda 'return x;'
  # TV media player art - on_value disabled, online_image component disabled for debugging
  - platform: homeassistant
    id: tv_album_art
    entity_id: ${tv_media_player}
    attribute: entity_picture
    # on_value:
    #   - if:
    #       condition:
    #         lambda: 'return !x.empty();'
    #       then:
    #         - online_image.set_url:
    #             id: tv_art
    #             url: !lambda 'return x;'
  # TV media player state for play/pause icon
  - platform: homeassistant
    id: tv_media_state
    entity_id: ${tv_media_player}
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lvgl.label.update:
                id: lbl_tv_play_pause
                text: "\U000F03E4"
          else:
            - lvgl.label.update:
                id: lbl_tv_play_pause
                text: "\U000F040A"
  # Sun state for nighttime screen off
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    on_value:
      - if:
          condition:
            lambda: 'return x == "below_horizon";'
          then:
            - globals.set:
                id: is_nighttime
                value: 'true'
#            - light.turn_off: back_light
          else:
            - globals.set:
                id: is_nighttime
                value: 'false'
#            - light.turn_on: back_light

binary_sensor:
  # NOTE: Power button on GPIO03 removed - it conflicts with deep_sleep wakeup_pin
  # The TCA8418 keypad button (btn_power_keypad, key 102) handles sleep entry
  # GPIO03 is used exclusively for deep sleep wake via hardware interrupt

  # ==================== TCA8418 MATRIX KEYPAD BUTTONS ====================
  # Using TCA8418 in keypad matrix mode (6 rows x 4 columns)
  # Matrix key formula: (row * 10) + col + 1
  # Row 0: keys 1, 2, 3, 4
  # Row 1: keys 11, 12, 13, 14
  # Row 2: keys 21, 22, 23, 24
  # Row 3: keys 31, 32, 33, 34
  # Row 4: keys 41, 42, 43, 44
  # Row 5: keys 51, 52, 53, 54
  #
  # You can also use row/col syntax: row: 0, col: 0 instead of key: 1
  #
  # NOTE: After flashing, check the logs to see which key codes are
  # generated when you press physical buttons, then update accordingly.

  # First row of round buttons
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_1
    row: 0
    col: 4
    name: "Botón 1"
    on_press:
      - logger.log: "Button 1 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_row1_btn1}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_2
    row: 0
    col: 3
    name: "Botón 2"
    on_press:
      - logger.log: "Button 2 - navigate left"
#      - script.execute: script_reset_backlight_timeout
      - script.execute: script_prev_page

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_3
    row: 0
    col: 1
    name: "Botón 3"
    on_press:
      - logger.log: "Button 3 - navigate right"
 #     - script.execute: script_reset_backlight_timeout
      - script.execute: script_next_page

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_4
    row: 1
    col: 0
    name: "Botón 4"
    on_press:
      - logger.log: "Button 4 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_row1_btn4}

  # Media Buttons around the DPad - Page-aware behavior
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_1
    row: 0
    col: 2
    name: "Botón Media 1"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_exit
          else:
            - logger.log: "Media Button 1 Pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_2
    row: 3
    col: 0
    name: "Botón Media 2"
    on_press:
      - logger.log: "Media Button 2 pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_3
    row: 1
    col: 2
    name: "Botón Media 3"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_prev
          else:
            - logger.log: "Media Button 3 pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_4
    row: 4
    col: 0
    name: "Botón Media 4"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_next
          else:
            - logger.log: "Media Button 4 pressed"

  # Dpad buttons - TV navigation
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_up
    row: 1
    col: 3
    name: "DPAD Up"
    on_press:
      - script.execute: script_tv_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_down
    row: 3
    col: 4
    name: "DPAD Down"
    on_press:
      - script.execute: script_tv_down

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_left
    row: 1
    col: 4
    name: "DPAD Left"
    on_press:
      - script.execute: script_tv_left

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_right
    row: 3
    col: 1
    name: "DPAD Right"
    on_press:
      - script.execute: script_tv_right

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_center
    row: 3
    col: 3
    name: "DPAD Center"
    on_press:
      - script.execute: script_tv_select

  # Volume Buttons - Page-aware (Room/Music = media player, TV = TV IR)
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_up
    row: 3
    col: 2
    name: "Volume Up"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_volume_up
          else:
            # Room page (0) or Music page (1) - control media player
            - script.execute: script_volume_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_down
    row: 4
    col: 2
    name: "Volume Down"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_volume_down
          else:
            # Room page (0) or Music page (1) - control media player
            - script.execute: script_volume_down

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_mute
    row: 4
    col: 3
    name: "Mute"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_mute
          else:
            # Room page (0) or Music page (1) - control media player
            - homeassistant.service:
                service: media_player.volume_mute
                data:
                  entity_id: media_player.${ma_player}
                  is_volume_muted: "True"

  # Channel/Record Buttons - TV remote
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_record
    row: 4
    col: 4
    name: "Record"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_play_pause
          else:
            - logger.log: "Record - launching automation"
            - homeassistant.service:
                service: script.turn_on
                data:
                  entity_id: ${automation_record}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_up
    row: 4
    col: 1
    name: "Channel Up"
    on_press:
      - script.execute: script_tv_channel_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_down
    row: 2
    col: 1
    name: "Channel Down"
    on_press:
      - script.execute: script_tv_channel_down

  # Scene Buttons - Launch automations
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_1
    row: 2
    col: 2
    name: "Scene Button 1"
    on_press:
      - logger.log: "Scene 1 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_1}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_2
    row: 2
    col: 4
    name: "Scene Button 2"
    on_press:
      - logger.log: "Scene 2 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_2}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_3
    row: 2
    col: 3
    name: "Scene Button 3"
    on_press:
      - logger.log: "Scene 3 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_3}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_4
    row: 2
    col: 0
    name: "Scene Button 4"
    on_press:
      - logger.log: "Scene 4 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_4}

  # Power button (GPIO ROW5 on TCA8418)
