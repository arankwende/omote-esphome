substitutions:
  name: omote
  friendly_name: Omote Remote
  ha_api_key: "YourHAAPIKey"
  ota_key: "YourOTAKey"
  # Music Assistant Configuration
  ma_host: "192.168.1.100"
  ma_port: "8095"
  ma_token: "your_token_here"
  ma_player: "room_speaker"
  # Home Assistant Entity IDs (update these to match your setup)
  climate_entity: climate.room_ac
  light_entity: light.room_light
  cover_entity_left: cover.room_blinds_left
  cover_entity_right: cover.room_blinds_right
  temp_sensor_entity: sensor.room_temperature
  tv_media_player: media_player.room_tv
  # Automation scripts for physical buttons (customize these)
  # Row 1: Button 1 and Button 4
  automation_row1_btn1: script.your_automation_1
  automation_row1_btn4: script.your_automation_2
  # Row 2: Button 1 and Button 4
  automation_row2_btn1: script.your_automation_3
  automation_row2_btn4: script.your_automation_4
  # Row 4: Button 1 and Button 4
  automation_row4_btn1: script.your_automation_5
  automation_row4_btn4: script.your_automation_6
  # Scene buttons
  automation_scene_1: script.scene_1
  automation_scene_2: script.scene_2
  automation_scene_3: script.scene_3
  automation_scene_4: script.scene_4
  # Record button
  automation_record: script.record_action
  # TV remote entity for DPAD and channel buttons
  tv_remote_entity: remote.room_tv
  # Weather entity for status bar
  weather_entity: weather.home
  # TV IR codes (first put the proper protocol action in remote_type, then fill the rest)
  # Format: depending on the protocol, it could be just "data:" as with pronto or address, command (hex values), you need to check which case and comment data and uncomment the others if its address command
  remote_type: transmit_pronto
#  tv_ir_address: "0x00"
  tv_ir_cmd_up: "0000 006D 0013 0000 006A 001F 0014 0020 0014 000F 0014 000F 0036 0032 0012 0010 0013 000F 0013 000F 0013 0010 0013 000F 0013 000F 0012 0010 0013 0010 0024 0020 0023 0010 0012 0022 0012 0011 0011 0011 0011 0180 "
  tv_ir_cmd_down: "0000 006D 0013 0000 006A 001F 0014 001F 0014 000F 0013 000F 0014 0020 0025 000F 0013 000F 0013 0010 0013 000F 0012 0010 0012 0010 0013 0010 0013 000F 0013 000F 0023 0021 0024 0010 0012 0021 0012 0010 0023 0180 "
  tv_ir_cmd_left: "0000 006D 0013 0000 0068 0022 0011 0022 0011 0011 0012 0011 0011 0022 0022 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0022 0022 0023 0011 0011 0022 0022 0022 0011 0180 "
  tv_ir_cmd_right: "0000 006D 0013 0000 0069 0021 0011 0021 0013 0010 0012 0010 0034 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0022 0022 0022 0012 0011 0011 0011 0022 0011 0011 0011 0180 "
  tv_ir_cmd_select: "0000 006D 0013 0000 0069 0021 0011 0021 0013 0010 0012 0010 0034 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0022 0022 0022 0012 0011 0011 0011 0022 0011 0011 0011 0180 "
  tv_ir_cmd_channel_up: "0000 006D 0015 0000 0068 0021 0012 0022 0011 0011 0011 0011 0012 0022 0022 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0022 0022 0012 0011 0011 0011 0011 0011 0011 0012 0011 0180 "
  tv_ir_cmd_channel_down: "0000 006D 0014 0000 0069 0022 0011 0022 0011 0011 0011 0012 0033 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0022 0011 0011 0022 0011 0011 0012 0180 "
  tv_ir_cmd_volume_up: "0000 006D 0015 0000 0069 0021 0013 0020 0014 000F 0014 000F 0014 0020 0025 000F 0013 000F 0013 0010 0013 000F 0012 0010 0011 0011 0013 0010 0013 000F 0013 000F 0012 0011 0012 0010 0023 0021 0012 0010 0012 0011 0012 0011 0011 0180"
  tv_ir_cmd_volume_down: "0000 006D 0013 0000 0069 0020 0014 0020 0014 000F 0014 000F 0036 0031 0013 0010 0012 0010 0013 000F 0013 0010 0013 000F 0013 000F 0012 0010 0013 0010 0012 0010 0012 0010 0023 0022 0012 0011 0011 0011 0022 0180 "
  tv_ir_cmd_mute: "0000 006D 0014 0000 0067 0022 0013 0020 0014 000F 0013 000F 0013 0020 0024 0010 0012 0010 0012 0010 0013 000F 0013 0010 0012 0010 0012 0010 0012 0011 0012 0011 0011 0011 0011 0011 0011 0011 0023 0011 0011 0022 0022 0180 "
  tv_ir_cmd_power_toggle: "0000 006D 0014 0000 0069 0022 0011 0022 0011 0011 0011 0012 0033 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0022 0011 0011 0022 0011 0011 0012 0180 "
  tv_ir_cmd_exit: "0x0A"
  tv_ir_cmd_rewind: "0x0E"
  tv_ir_cmd_fastforward: "0x0F"
  #IP Configuration for static IP - to enable it, first un comment the section in Wifi
  static_ip: 192.168.1.101
  gateway: 192.168.1.1
  subnet: 255.255.255.0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Required to set lcd_rd off before display will work
    - priority: 600
      then:
        - output.turn_off: lcd_rd
    # Turn on backlight after boot (including wake from deep sleep)
    - priority: -100
      then:
        - light.turn_on: back_light
        - globals.set:
            id: device_sleeping
            value: 'false'

# External components
# NOTE: Comment out components that cause boot loops if hardware not detected
external_components:
  # TCA8418 keypad matrix -github component
  # - source: github://arankwende/esphome-tca8418_keypad
  #   components: [tca8418_keypad]
  # TCA8418 keypad matrix - using local component based on Adafruit library
  - source:
      type: local
      path: components
    components: [tca8418_keypad]

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240Mhz
  framework:
    type: esp-idf
# Deep sleep configuration
# Wake source: GPIO03 (power button)
# Sleep is triggered manually by the power button (TCA8418 key 102)
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO03
#    allow_other_uses: true
    inverted: true  # Wake on button press (LOW)
    ignore_strapping_warning: true
  wakeup_pin_mode: KEEP_AWAKE
  # Note: For gyroscope wake, the IMU INT pin would need to be connected
  # to an EXT1 capable GPIO (0-21 on ESP32-S3). If your Omote has this,
  # add it to esp32_ext1_wakeup below
  # esp32_ext1_wakeup:
  #   pins:
  #     - GPIO07  # IMU INT pin if available
  #   mode: ANY_HIGH
# PSRAM configuration - CRITICAL for LVGL display
# The Omote uses ESP32-S3 with PSRAM
psram:
  mode: octal
  speed: 80MHz
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: ${ha_api_key}
  on_client_connected:
    - logger.log: "Home Assistant connected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0x00FF00
  on_client_disconnected:
    - logger.log: "Home Assistant disconnected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
ota:
  - platform: esphome
    password: ${ota_key}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFFFFFF
  on_disconnect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
# Manual IP config
  manual_ip:
      static_ip: ${static_ip}
      gateway: ${gateway}
      subnet: ${subnet}
# web_server:  # Disabled temporarily to reduce memory usage
#   port: 80

http_request:
  useragent: esphome/omote
  timeout: 10s

# online_image:  # Disabled temporarily - PNG decoding uses significant memory
