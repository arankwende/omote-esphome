globals:
  - id: music_playing
    type: bool
    initial_value: "false"
  - id: current_page
    type: int
    initial_value: "0"
  - id: touch_x_start
    type: int
    initial_value: "0"
  - id: touch_y_start
    type: int
    initial_value: "0"
  - id: touch_x_end
    type: int
    initial_value: "0"
  - id: touch_y_end
    type: int
    initial_value: "0"
  # Playlist storage (max 20 playlists)
  - id: playlist_names
    type: std::vector<std::string>
  - id: playlist_uris
    type: std::vector<std::string>
  - id: selected_playlist_idx
    type: int
    initial_value: "0"
  - id: playlists_loaded
    type: bool
    initial_value: "false"
  # Device sleep state tracking
  - id: device_sleeping
    type: bool
    initial_value: "false"
  # Nighttime mode tracking (sundown to sunrise)
  - id: is_nighttime
    type: bool
    initial_value: "false"
  # Last activity timestamp for backlight timeout
  - id: last_activity_time
    type: uint32_t
    initial_value: "0"

script:
  # Reset backlight timeout - call this on any user activity
#  - id: script_reset_backlight_timeout
#    then:
#      - light.turn_on: back_light
#      - globals.set:
#          id: last_activity_time
#          value: !lambda 'return millis();'


  # Deep sleep script
  - id: script_enter_deep_sleep
    then:
      - logger.log: "Entering deep sleep..."
      - globals.set:
          id: device_sleeping
          value: 'true'
      # Turn off the backlight before sleeping
      - light.turn_off: back_light
      # Small delay to ensure everything is ready
      - delay: 100ms
      # Enter deep sleep
      - deep_sleep.enter: deep_sleep_ctrl

  # Wake device script (called by power button or motion)
#  - id: script_wake_device
#    then:
#      - logger.log: "Waking device..."
#      - globals.set:
#          id: device_sleeping
#          value: 'false'
#      - light.turn_on: back_light
#      - globals.set:
#          id: last_activity_time
#          value: !lambda 'return millis();'
#      - lvgl.resume:
#  - id: script_wake_device
#    then:
#      - logger.log: "Waking device..."
#      - globals.set:
#          id: device_sleeping
#          value: 'false'
#      - light.turn_on: back_light
#      - lvgl.resume:
#      - lvgl.widget.redraw:
  # Volume up script for Music Assistant
  - id: script_volume_up
    then:
      - logger.log: "Volume Up"
      - lambda: |-
          int current_vol = (int)(id(music_volume).state * 100);
          int new_vol = std::min(100, current_vol + 5);
          id(script_music_volume).execute(new_vol);

  # Volume down script for Music Assistant
  - id: script_volume_down
    then:
      - logger.log: "Volume Down"
      - lambda: |-
          int current_vol = (int)(id(music_volume).state * 100);
          int new_vol = std::max(0, current_vol - 5);
          id(script_music_volume).execute(new_vol);

  # Page navigation scripts (3 pages: room, music, tv)
  - id: script_next_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 1) % 3;'
      - lvgl.page.next:
          animation: MOVE_LEFT
          time: 300ms

  - id: script_prev_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 2) % 3;'
      - lvgl.page.previous:
          animation: MOVE_RIGHT
          time: 300ms

  # Music Assistant API scripts
  - id: script_music_play_pause
    then:
      - if:
          condition:
            lambda: 'return id(music_playing);'
          then:
            - http_request.post:
                url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  return "{\"command\":\"player_queues/pause\",\"args\":{\"queue_id\":\"${ma_player}\"}}";
          else:
            - http_request.post:
                url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  return "{\"command\":\"player_queues/play\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_next
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            return "{\"command\":\"player_queues/next\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_prev
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            return "{\"command\":\"player_queues/previous\",\"args\":{\"queue_id\":\"${ma_player}\"}}";

  - id: script_music_volume
    parameters:
      volume: int
    then:
      - http_request.post:
          url: !lambda 'return "http://${ma_host}:${ma_port}/api";'
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: !lambda |-
            char buf[256];
            snprintf(buf, sizeof(buf), "{\"command\":\"players/cmd/volume_set\",\"args\":{\"player_id\":\"${ma_player}\",\"volume_level\":%d}}", volume);
            return std::string(buf);

  # TV control scripts - DPAD navigation
  - id: script_tv_up
    then:
      - logger.log: "TV: Up"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_up}

  - id: script_tv_down
    then:
      - logger.log: "TV: Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_down}

  - id: script_tv_left
    then:
      - logger.log: "TV: Left"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_left}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_left}
  - id: script_tv_right
    then:
      - logger.log: "TV: Right"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_right}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_right}

  - id: script_tv_select
    then:
      - logger.log: "TV: Select"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_select}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_select}

  # TV control scripts - Channel
  - id: script_tv_channel_up
    then:
      - logger.log: "TV: Channel Up"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_channel_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_channel_up}

  - id: script_tv_channel_down
    then:
      - logger.log: "TV: Channel Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_channel_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_channel_down}

  # TV control scripts - Volume
  - id: script_tv_volume_up
    then:
      - logger.log: "TV: Volume Up"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_volume_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_volume_up}
  - id: script_tv_volume_down
    then:
      - logger.log: "TV: Volume Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_volume_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_volume_down}

  - id: script_tv_mute
    then:
      - logger.log: "TV: Mute"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_mute}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_mute}

  - id: script_tv_rewind
    then:
      - logger.log: "TV: Rewind"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_rewind}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_rewind}

  - id: script_tv_fastforward
    then:
      - logger.log: "TV: Fast Forward"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_fastforward}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_fastforward}

  - id: script_tv_exit
    then:
      - logger.log: "TV: Exit"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_exit}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_exit}

  - id: script_tv_power_toggle
    then:
      - logger.log: "TV: Power Toggle"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_power_toggle}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_power_toggle}

  # TV media player control scripts
  - id: script_tv_media_play_pause
    then:
      - logger.log: "TV Media: Play/Pause"
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${tv_media_player}

  - id: script_tv_media_next
    then:
      - logger.log: "TV Media: Next"
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: ${tv_media_player}

  - id: script_tv_media_prev
    then:
      - logger.log: "TV Media: Previous"
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: ${tv_media_player}

  # App launch scripts - using Home Assistant service calls
  - id: script_launch_jellyfin
    then:
      - logger.log: "Launching Jellyfin"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Jellyfin"

  - id: script_launch_prime
    then:
      - logger.log: "Launching Prime Video"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Prime Video"

  - id: script_launch_netflix
    then:
      - logger.log: "Launching Netflix"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Netflix"

  - id: script_launch_hbo
    then:
      - logger.log: "Launching HBO Max"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "HBO Max"

  - id: script_launch_disney
    then:
      - logger.log: "Launching Disney+"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Disney+"

  # Playlist scripts
  - id: script_fetch_playlists
    then:
      - logger.log: "Fetching playlists from Music Assistant"
      - http_request.post:
          url: "http://${ma_host}:${ma_port}/api"
          capture_response: true
          max_response_buffer_size: 2048
          request_headers:
            Authorization: "Bearer ${ma_token}"
            Content-Type: "application/json"
          body: '{"command":"music/playlists/library_items","args":{"limit":20}}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    // Clear existing playlists
                    id(playlist_names).clear();
                    id(playlist_uris).clear();

                    // Store body for parsing
                    std::string response_body = body;

                    // Log success
                    ESP_LOGD("playlists", "Received response: %d bytes", response_body.length());

                    // TODO: Implement proper JSON parsing
                    // For now, set some test playlists
                    id(playlist_names).push_back("Playlist 1");
                    id(playlist_names).push_back("Playlist 2");
                    id(playlist_names).push_back("Playlist 3");
                    id(playlist_uris).push_back("library://playlist/1");
                    id(playlist_uris).push_back("library://playlist/2");
                    id(playlist_uris).push_back("library://playlist/3");
                    id(playlists_loaded) = true;

                    ESP_LOGI("playlists", "Loaded %d playlists", id(playlist_names).size());
                  } else {
                    ESP_LOGE("playlists", "Failed to fetch playlists: %d", response->status_code);
                  }

  - id: script_play_selected_playlist
    then:
      - if:
          condition:
            lambda: 'return id(playlists_loaded) && id(selected_playlist_idx) < id(playlist_uris).size();'
          then:
            - lambda: |-
                std::string uri = id(playlist_uris)[id(selected_playlist_idx)];
                ESP_LOGD("playlists", "Playing playlist: %s", uri.c_str());
            - http_request.post:
                url: "http://${ma_host}:${ma_port}/api"
                request_headers:
                  Authorization: "Bearer ${ma_token}"
                  Content-Type: "application/json"
                body: !lambda |-
                  std::string uri = id(playlist_uris)[id(selected_playlist_idx)];
                  char buf[512];
                  snprintf(buf, sizeof(buf),
                    "{\"command\":\"player_queues/play_media\",\"args\":{\"queue_id\":\"${ma_player}\",\"media\":\"%s\",\"option\":\"replace\"}}",
                    uri.c_str());
                  return std::string(buf);


i2c:
  sda: GPIO20
  scl: GPIO19
  frequency: 100kHz  # Reduced from 400kHz for more reliable communication
  # Expected devices: 0x38 (FT63X6 touchscreen), 0x34 (TCA8418 keypad), 0x6B (IMU)
  sda_pullup_enabled: true  # Enable internal pull-ups
  scl_pullup_enabled: true  # Enable internal pull-ups
  scan: false
  timeout: 100ms  # Add timeout to prevent hanging

# TCA8418 Keypad Matrix Controller (based on Adafruit library)
# Matrix mode: keys 1-24 for 6x4 matrix (row * 10 + col + 1)
# GPIO mode: keys 97-104 = ROW0-ROW7, keys 105-114 = COL0-COL9
tca8418_keypad:
  id: keypad
  address: 0x34
  rows: 5
  cols: 5
  interrupt_pin: 8

# IMU sensor for motion wake detection (QMI8658 on Omote)
# Used to wake device when picked up

output:
  # LCD Backlight GPIO
  - platform: ledc
    id: gpio_09
    pin:
      number: GPIO09
      inverted: true
  # Keypad Backlight GPIO
  - platform: ledc
    id: gpio_46
    pin:
      number: GPIO46
      inverted: False
      ignore_strapping_warning: true
  - platform: gpio
    # lcd_rd pin needs to be set HIGH before LCD will work.
    # Set HIGH (turn off) with boot priority in esphome section.
    id: lcd_rd
    pin:
      number: GPIO42
      inverted: True

light:
  - platform: monochromatic
    id: back_light
    output: gpio_09
    restore_mode: RESTORE_DEFAULT_ON
    name: "LCD Backlight"
  - platform: monochromatic
    output: gpio_46
    restore_mode: RESTORE_DEFAULT_OFF
    name: "Keypad Backlight"


touchscreen:
  - platform: ft63x6
    id: my_touch
    display: LCD
    address: 0x38
    calibration:
      x_min: 0
      x_max: 237
      y_min: 0
      y_max: 319
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lvgl.resume:
              - lvgl.widget.redraw:
        # Wake screen on touch and reset the 2-minute timeout
#        - script.execute: script_reset_backlight_timeout

spi:
  - id: quad_spi_bus
    type: octal
    clk_pin:
      number: GPIO41
    data_pins:
      - GPIO48
      - GPIO47
      - GPIO21
      - GPIO14
      - GPIO13
      - GPIO12
      - GPIO11
      - GPIO10

display:
  - platform: mipi_spi
    id: LCD
    model: ILI9341
    bus_mode: octal
    dc_pin: GPIO40
    cs_pin: GPIO39
    enable_pin:
      number: GPIO38
      inverted: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

