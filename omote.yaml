    name: "Power Button"
    on_press:
      - logger.log: "Power button pressed - entering deep sleep"
      - script.execute: script_enter_deep_sleep



globals:
  - id: music_playing
    type: bool
    initial_value: "false"
  - id: current_page
    type: int
    initial_value: "0"
  - id: touch_x_start
    type: int
    initial_value: "0"
  - id: touch_y_start
    type: int
    initial_value: "0"
  - id: touch_x_end
    type: int
    initial_value: "0"
  - id: touch_y_end
    type: int
    initial_value: "0"
  # Device sleep state tracking
  - id: device_sleeping
    type: bool
    initial_value: "false"
  # Nighttime mode tracking (sundown to sunrise)
  - id: is_nighttime
    type: bool
    initial_value: "false"
  # Last activity timestamp for backlight timeout
  - id: last_activity_time
    type: uint32_t
    initial_value: "0"

script:
  # Reset backlight timeout - call this on any user activity
  - id: script_reset_backlight_timeout
    then:
      - light.turn_on: back_light
      - globals.set:
          id: last_activity_time
          value: !lambda 'return millis();'


  # Deep sleep script
  - id: script_enter_deep_sleep
    then:
      - logger.log:
          level: WARN
          format: ">>> DEEP SLEEP SCRIPT STARTED <<<"
      - globals.set:
          id: device_sleeping
          value: 'true'
      - light.turn_off: back_light
      - delay: 200ms
#      - logger.log:
#          level: WARN
#          format: ">>> DISCONNECTING WIFI <<<"
#      - wifi.disable:
#      - delay: 500ms
      - logger.log:
          level: WARN
          format: ">>> ENTERING DEEP SLEEP NOW <<<"
      - deep_sleep.enter: deep_sleep_ctrl


  # Wake device script
  - id: script_wake_device
    then:
      - logger.log: "Waking device..."
      - globals.set:
          id: device_sleeping
          value: 'false'
      - light.turn_on: back_light
      - lvgl.resume:
      - lvgl.widget.redraw:
  - id: script_volume_up
    then:
      - homeassistant.service:
          service: media_player.volume_up
          data:
            entity_id: media_player.${ma_player}

  - id: script_volume_down
    then:
      - homeassistant.service:
          service: media_player.volume_down
          data:
            entity_id: media_player.${ma_player}

  # Page navigation scripts (3 pages: room, music, tv)
  - id: script_next_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 1) % 3;'
      - lvgl.page.next:
          animation: MOVE_LEFT
          time: 300ms

  - id: script_prev_page
    then:
      - globals.set:
          id: current_page
          value: !lambda 'return (id(current_page) + 2) % 3;'
      - lvgl.page.previous:
          animation: MOVE_RIGHT
          time: 300ms

  # Music control scripts (via Home Assistant media_player services)
  - id: script_music_play_pause
    then:
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: media_player.${ma_player}

  - id: script_music_next
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: media_player.${ma_player}

  - id: script_music_prev
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: media_player.${ma_player}

  # TV control scripts - DPAD navigation
  - id: script_tv_up
    then:
      - logger.log: "TV: Up"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_up}

  - id: script_tv_down
    then:
      - logger.log: "TV: Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_down}

  - id: script_tv_left
    then:
      - logger.log: "TV: Left"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_left}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_left}
  - id: script_tv_right
    then:
      - logger.log: "TV: Right"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_right}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_right}

  - id: script_tv_select
    then:
      - logger.log: "TV: Select"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_select}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_select}

  # TV control scripts - Channel
  - id: script_tv_channel_up
    then:
      - logger.log: "TV: Channel Up"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_channel_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_channel_up}

  - id: script_tv_channel_down
    then:
      - logger.log: "TV: Channel Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_channel_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_channel_down}

  # TV control scripts - Volume
  - id: script_tv_volume_up
    then:
      - logger.log: "TV: Volume Up"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_volume_up}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_volume_up}
  - id: script_tv_volume_down
    then:
      - logger.log: "TV: Volume Down"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_volume_down}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_volume_down}

  - id: script_tv_mute
    then:
      - logger.log: "TV: Mute"
      - remote_transmitter.${remote_type}:
          data : ${tv_ir_cmd_mute}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_mute}

  - id: script_tv_rewind
    then:
      - logger.log: "TV: Rewind"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_rewind}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_rewind}

  - id: script_tv_fastforward
    then:
      - logger.log: "TV: Fast Forward"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_fastforward}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_fastforward}

  - id: script_tv_exit
    then:
      - logger.log: "TV: Exit"
      - remote_transmitter.${remote_type}:
          data: ${tv_ir_cmd_exit}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_exit}

  - id: script_tv_power_toggle
    then:
      - logger.log: "TV: Power Toggle"
#      - remote_transmitter.${remote_type}:
#          data: ${tv_ir_cmd_power_toggle}
#          address: ${tv_ir_address}
#          command: ${tv_ir_cmd_power_toggle}
      - remote_transmitter.transmit_raw:
          transmitter_id: IR_TX
          carrier_frequency: 38kHz
          code: [2703, -916, 442, -876, 463, -436, 465, -458, 436, -876, 913, -438, 462, -435, 458, -464, 437, -459, 435, -436, 461, -464, 437, -434, 466, -456, 440, -457, 435, -461, 436, -462, 433, -437, 909, -440, 459, -910, 435, -464, 436]

  # TV media player control scripts
  - id: script_tv_media_play_pause
    then:
      - logger.log: "TV Media: Play/Pause"
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${tv_media_player}

  - id: script_tv_media_next
    then:
      - logger.log: "TV Media: Next"
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: ${tv_media_player}

  - id: script_tv_media_prev
    then:
      - logger.log: "TV Media: Previous"
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: ${tv_media_player}

  - id: script_launch_jellyfin
    then:
      - logger.log: "Launching Jellyfin"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Jellyfin"

  - id: script_launch_prime
    then:
      - logger.log: "Launching Prime Video"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Prime Video"

  - id: script_launch_netflix
    then:
      - logger.log: "Launching Netflix"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Netflix"

  - id: script_launch_hbo
    then:
      - logger.log: "Launching HBO Max"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "HBO Max"

  - id: script_launch_disney
    then:
      - logger.log: "Launching Disney+"
      - homeassistant.service:
          service: media_player.select_source
          data:
            entity_id: ${tv_media_player}
            source: "Disney+"

  # Playlist quick-play scripts
  - id: script_play_morning_playlist
    then:
      - homeassistant.service:
          service: media_player.play_media
          data:
            entity_id: media_player.${ma_player}
            media_content_id: "${ma_morning_playlist}"
            media_content_type: "music"

  - id: script_play_evening_playlist
    then:
      - homeassistant.service:
          service: media_player.play_media
          data:
            entity_id: media_player.${ma_player}
            media_content_id: "${ma_evening_playlist}"
            media_content_type: "music"


i2c:
  id: i2c_bus
  sda: GPIO20
  scl: GPIO19
  frequency: 100kHz  
  sda_pullup_enabled: true  
  scl_pullup_enabled: true 
  scan: true
  timeout: 100ms  

tca8418_keypad:
  id: keypad
  address: 0x34
  rows: 5
  cols: 5
  interrupt_pin:
    number: 8

output:
  # LCD Backlight GPIO
  - platform: ledc
    id: gpio_09
    pin:
      number: GPIO09
      inverted: true
  # Keypad Backlight GPIO
  - platform: ledc
    id: gpio_46
    pin:
      number: GPIO46
      inverted: False
      ignore_strapping_warning: true
  - platform: gpio
    # lcd_rd pin needs to be set HIGH before LCD will work.
    # Set HIGH (turn off) with boot priority in esphome section.
    id: lcd_rd
    pin:
      number: GPIO42
      inverted: True

light:
  - platform: monochromatic
    id: back_light
    output: gpio_09
    restore_mode: RESTORE_DEFAULT_ON
    name: "LCD Backlight"
  - platform: monochromatic
    id: keypad_backlight
    output: gpio_46
    restore_mode: RESTORE_DEFAULT_OFF
    name: "Keypad Backlight"


touchscreen:
  - platform: ft63x6
    id: my_touch
    display: LCD
    address: 0x38
    calibration:
      x_min: 0
      x_max: 237
      y_min: 0
      y_max: 319
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lvgl.resume:
              - lvgl.widget.redraw:
        - script.execute: script_reset_backlight_timeout

spi:
  - id: quad_spi_bus
    type: octal
    clk_pin:
      number: GPIO41
    data_pins:
      - GPIO48
      - GPIO47
      - GPIO21
      - GPIO14
      - GPIO13
      - GPIO12
      - GPIO11
      - GPIO10

display:
  - platform: mipi_spi
    id: LCD
    model: ILI9341
    bus_mode: octal
    dc_pin: GPIO40
    cs_pin: GPIO39
    enable_pin:
      number: GPIO38
      inverted: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

