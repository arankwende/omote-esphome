substitutions:
  name: omote
  friendly_name: Omote Remote
  ha_api_key: "YourHAAPIKey"
  ota_key: "YourOTAKey"
  # Music Assistant player entity (without the media_player. prefix)
  ma_player: "room_speaker"
  # Home Assistant Entity IDs (update these to match your setup)
  climate_entity: climate.room_ac
  light_entity: light.room_light
  cover_entity_left: cover.room_blinds_left
  cover_entity_right: cover.room_blinds_right
  temp_sensor_entity: sensor.room_temperature
  tv_media_player: media_player.room_tv
  # Automation scripts for physical buttons (customize these)
  # Row 1: Button 1 and Button 4
  automation_row1_btn1: script.your_automation_1
  automation_row1_btn4: script.your_automation_2
  # Row 2: Button 1 and Button 4
  automation_row2_btn1: script.your_automation_3
  automation_row2_btn4: script.your_automation_4
  # Row 4: Button 1 and Button 4
  automation_row4_btn1: script.your_automation_5
  automation_row4_btn4: script.your_automation_6
  # Scene buttons
  automation_scene_1: script.scene_1
  automation_scene_2: script.scene_2
  automation_scene_3: script.scene_3
  automation_scene_4: script.scene_4
  # Record button
  automation_record: script.record_action
  # TV remote entity for DPAD and channel buttons
  tv_remote_entity: remote.room_tv
  # Weather entity for status bar
  weather_entity: weather.home
  # Home Assistant base URL (needed to resolve relative entity_picture URLs)
  ha_url: "http://homeassistant.local:8123"
  # Music Assistant playlist URIs for quick-play buttons (find these in MA library)
  ma_morning_playlist: "library://playlist/1"
  ma_evening_playlist: "library://playlist/2"
  # TV IR codes (first put the proper protocol action in remote_type, then fill the rest)
  # Format: depending on the protocol, it could be just "data:" as with pronto or address, command (hex values), you need to check which case and comment data and uncomment the others if its address command
  remote_type: transmit_pronto
#  tv_ir_address: "0x00"
  tv_ir_cmd_up: "0000 006D 0013 0000 006A 001F 0014 0020 0014 000F 0014 000F 0036 0032 0012 0010 0013 000F 0013 000F 0013 0010 0013 000F 0013 000F 0012 0010 0013 0010 0024 0020 0023 0010 0012 0022 0012 0011 0011 0011 0011 0180 "
  tv_ir_cmd_down: "0000 006D 0013 0000 006A 001F 0014 001F 0014 000F 0013 000F 0014 0020 0025 000F 0013 000F 0013 0010 0013 000F 0012 0010 0012 0010 0013 0010 0013 000F 0013 000F 0023 0021 0024 0010 0012 0021 0012 0010 0023 0180 "
  tv_ir_cmd_left: "0000 006D 0013 0000 0068 0022 0011 0022 0011 0011 0012 0011 0011 0022 0022 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0022 0022 0023 0011 0011 0022 0022 0022 0011 0180 "
  tv_ir_cmd_right: "0000 006D 0013 0000 0069 0021 0011 0021 0013 0010 0012 0010 0034 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0022 0022 0022 0012 0011 0011 0011 0022 0011 0011 0011 0180 "
  tv_ir_cmd_select: "0000 006D 0013 0000 0069 0021 0011 0021 0013 0010 0012 0010 0034 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0022 0022 0022 0012 0011 0011 0011 0022 0011 0011 0011 0180 "
  tv_ir_cmd_channel_up: "0000 006D 0015 0000 0068 0021 0012 0022 0011 0011 0011 0011 0012 0022 0022 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0022 0022 0012 0011 0011 0011 0011 0011 0011 0012 0011 0180 "
  tv_ir_cmd_channel_down: "0000 006D 0014 0000 0069 0022 0011 0022 0011 0011 0011 0012 0033 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0022 0011 0011 0022 0011 0011 0012 0180 "
  tv_ir_cmd_volume_up: "0000 006D 0015 0000 0069 0021 0013 0020 0014 000F 0014 000F 0014 0020 0025 000F 0013 000F 0013 0010 0013 000F 0012 0010 0011 0011 0013 0010 0013 000F 0013 000F 0012 0011 0012 0010 0023 0021 0012 0010 0012 0011 0012 0011 0011 0180"
  tv_ir_cmd_volume_down: "0000 006D 0013 0000 0069 0020 0014 0020 0014 000F 0014 000F 0036 0031 0013 0010 0012 0010 0013 000F 0013 0010 0013 000F 0013 000F 0012 0010 0013 0010 0012 0010 0012 0010 0023 0022 0012 0011 0011 0011 0022 0180 "
  tv_ir_cmd_mute: "0000 006D 0014 0000 0067 0022 0013 0020 0014 000F 0013 000F 0013 0020 0024 0010 0012 0010 0012 0010 0013 000F 0013 0010 0012 0010 0012 0010 0012 0011 0012 0011 0011 0011 0011 0011 0011 0011 0023 0011 0011 0022 0022 0180 "
  tv_ir_cmd_power_toggle: "0000 006D 0014 0000 0069 0022 0011 0022 0011 0011 0011 0012 0033 0033 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0011 0011 0011 0011 0011 0011 0012 0011 0022 0011 0011 0022 0011 0011 0012 0180 "
  tv_ir_cmd_exit: "0x0A"
  tv_ir_cmd_rewind: "0x0E"
  tv_ir_cmd_fastforward: "0x0F"
  #IP Configuration for static IP - to enable it, first un comment the section in Wifi
  static_ip: 192.168.1.101
  gateway: 192.168.1.1
  subnet: 255.255.255.0
  dns1: 192.168.1.1
  dns2: 8.8.8.8


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Required to set lcd_rd off before display will work
    - priority: 600
      then:
        - output.turn_off: lcd_rd
    # Turn on backlight after boot (including wake from deep sleep)
    - priority: -100
      then:
        - light.turn_on: back_light
        - globals.set:
            id: device_sleeping
            value: 'false'

# External components
# NOTE: Comment out components that cause boot loops if hardware not detected
external_components:
  # TCA8418 keypad matrix -github component
  - source: github://arankwende/tca8418-keypad-esphome@main
  - source: github://arankwende/lis3dh-esphome@main

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240Mhz
  framework:
    type: esp-idf
# Deep sleep configuration
# Wake source: GPIO02 (LIS3DH motion interrupt, active HIGH)
# Note: GPIO08 (TCA8418 INT) is active-LOW (idle HIGH), incompatible with ANY_HIGH mode
deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO03
#    allow_other_uses: true
    inverted: true  # Wake on button press (LOW)
    ignore_strapping_warning: true
  wakeup_pin_mode: KEEP_AWAKE
# PSRAM configuration - CRITICAL for LVGL display
# The Omote uses ESP32-S3 with PSRAM
psram:
  mode: octal
  speed: 80MHz
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: ${ha_api_key}
  on_client_connected:
    - logger.log: "Home Assistant connected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0x00FF00
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0x00FF00
  on_client_disconnected:
    - logger.log: "Home Assistant disconnected"
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
ota:
  - platform: esphome
    password: ${ota_key}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFFFFFF
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFFFFFF
  on_disconnect:
    - lvgl.widget.update:
        id: lbl_wifi_room
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_music
        text_color: 0xFF0000
    - lvgl.widget.update:
        id: lbl_wifi_tv
        text_color: 0xFF0000
# Manual IP config
  manual_ip:
      static_ip: ${static_ip}
      gateway: ${gateway}
      subnet: ${subnet}
      dns1: ${dns1}
      dns2: ${dns2}
# web_server:  # Disabled temporarily to reduce memory usage
#   port: 80

http_request:
  useragent: esphome/omote
  timeout: 10s

online_image:
    - id: album_art
      url: "https://via.placeholder.com/100"
      format: JPEG
      type: RGB565
      resize: 100x100
      on_download_finished:
        - logger.log: "Album art downloaded OK"
        - lvgl.image.update:
            id: img_album_art
            src: album_art
        - lvgl.widget.redraw:
      on_error:
        - logger.log:
            level: WARN
            format: "Album art download FAILED"

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_time_room
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_time_music
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");
          - lvgl.label.update:
              id: lbl_time_tv
              text: !lambda |-
                auto time = id(homeassistant_time).now();
                return time.strftime("%H:%M");


#set up battery sensor (MAX17043/MAX17048 fuel gauge at I2C 0x36)
sensor:
  # LIS3DH accelerometer (I2C 0x19) - acceleration + motion interrupt for deep sleep wake
  - platform: lis3dh_motion
    id: accel
    address: 0x19
    threshold: 16  # ~256mg motion wake threshold (16mg/LSB at +/-2g)
    update_interval: 60s
    accel_x:
      name: "Accel X"
      id: accel_x
    accel_y:
      name: "Accel Y"
      id: accel_y
    accel_z:
      name: "Accel Z"
      id: accel_z
    temperature:
      name: "LIS3DH Temperature"
      id: accel_temp
  - platform: max17043
    battery_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    battery_level:
      id: battery_level
      name: "Battery Level"
    update_interval: 60s
  # Home Assistant sensors
  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_sensor_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_temperature
          text:
            format: "%.1f°C"
            args: ['x']
  - platform: homeassistant
    id: climate_target_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_target_temp
          text:
            format: "%.0f°C"
            args: ['x']
  - platform: homeassistant
    id: blinds_position_left
    entity_id: ${cover_entity_left}
    attribute: current_position
    on_value:
      - lvgl.label.update:
          id: lbl_blinds_left_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  - platform: homeassistant
    id: blinds_position_right
    entity_id: ${cover_entity_right}
    attribute: current_position
    on_value:
      - lvgl.label.update:
          id: lbl_blinds_right_pct
          text:
            format: "%d%%"
            args: ['(int)x']
  # Outdoor temperature from weather entity
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_outdoor_temp_room
          text:
            format: "%.0f°"
            args: ['x']
      - lvgl.label.update:
          id: lbl_outdoor_temp_music
          text:
            format: "%.0f°"
            args: ['x']
      - lvgl.label.update:
          id: lbl_outdoor_temp_tv
          text:
            format: "%.0f°"
            args: ['x']
  - platform: homeassistant
    id: music_volume
    entity_id: media_player.${ma_player}
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: slider_volume
          value: !lambda 'return (int)(x * 100);'

button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "TV IR"
    on_press:
      - script.execute: script_tv_power_toggle # This executes the script defined 

text_sensor:
  # Weather condition from weather entity
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    on_value:
      - lambda: |-
          // Map weather conditions to MDI icons
          std::string icon = "\U000F0599"; // default sunny
          if (x == "cloudy") icon = "\U000F0595";
          else if (x == "partlycloudy") icon = "\U000F067E";
          else if (x == "rainy") icon = "\U000F0598";
          else if (x == "pouring") icon = "\U000F0597";
          else if (x == "snowy") icon = "\U000F059D";
          else if (x == "fog") icon = "\U000F0591";
          else if (x == "windy") icon = "\U000F059E";
          else if (x == "lightning" || x == "lightning-rainy") icon = "\U000F0593";
          else if (x == "sunny" || x == "clear-night") icon = "\U000F0599";

          // Update all weather icons using LVGL C API
          lv_label_set_text(id(lbl_weather_room), icon.c_str());
          lv_label_set_text(id(lbl_weather_music), icon.c_str());
          lv_label_set_text(id(lbl_weather_tv), icon.c_str());
  # Climate state
  - platform: homeassistant
    id: climate_state
    entity_id: ${climate_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_climate_mode
          text: !lambda 'return x;'
  # Light state
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    on_value:
      - if:
          condition:
            lambda: 'return x == "on";'
          then:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0xFFCC00
          else:
            - lvgl.widget.update:
                id: btn_light
                bg_color: 0x333333
  # Music Assistant player info
  - platform: homeassistant
    id: music_title
    entity_id: media_player.${ma_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_music_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_artist
    entity_id: media_player.${ma_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_music_artist
          text: !lambda 'return x;'
  # TV media player info
  - platform: homeassistant
    id: tv_media_title
    entity_id: ${tv_media_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lbl_tv_title
          text: !lambda 'return x;'
  - platform: homeassistant
    id: tv_media_artist
    entity_id: ${tv_media_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lbl_tv_artist
          text: !lambda 'return x;'
  - platform: homeassistant
    id: music_state
    entity_id: media_player.${ma_player}
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F03E4"
            - globals.set:
                id: music_playing
                value: 'true'
          else:
            - lvgl.label.update:
                id: lbl_play_pause
                text: "\U000F040A"
            - globals.set:
                id: music_playing
                value: 'false'
  - platform: homeassistant
    id: music_album_art
    entity_id: media_player.${ma_player}
    attribute: entity_picture
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - logger.log:
                level: DEBUG
                format: "Album art URL: %s"
                args: ['x.c_str()']
            - online_image.set_url:
                id: album_art
                # Handle both relative (/api/...) and absolute (http://...) URLs
                url: !lambda |-
                  if (x.rfind("http", 0) == 0) return x;
                  return std::string("${ha_url}") + x;
  # TV media player art - no display widget on TV page, sensor omitted
  # TV media player state for play/pause icon
  - platform: homeassistant
    id: tv_media_state
    entity_id: ${tv_media_player}
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lvgl.label.update:
                id: lbl_tv_play_pause
                text: "\U000F03E4"
          else:
            - lvgl.label.update:
                id: lbl_tv_play_pause
                text: "\U000F040A"
  # Sun state for nighttime screen off
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    on_value:
      - if:
          condition:
            lambda: 'return x == "below_horizon";'
          then:
            - globals.set:
                id: is_nighttime
                value: 'true'
#            - light.turn_off: back_light
          else:
            - globals.set:
                id: is_nighttime
                value: 'false'
#            - light.turn_on: back_light

binary_sensor:
  # LIS3DH motion interrupt on INT1 (GPIO02)
  # Goes HIGH when motion detected, cleared by reading INT1_SRC
  - platform: gpio
    id: motion_detected
    name: "Motion Detected"
    pin:
      number: GPIO02
      mode: INPUT
    filters:
      - delayed_off: 100ms
    on_press:
      - logger.log: "Motion detected - waking screen"
      - light.turn_on: back_light
      - light.turn_on:
          id: keypad_backlight
          brightness: 100%
      - delay: 20s
      - light.turn_off: keypad_backlight
      # Clear the latched interrupt so it can trigger again
      - lambda: 'id(accel).clear_interrupt();'

  # ==================== TCA8418 MATRIX KEYPAD BUTTONS ====================
  #
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_1
    row: 0
    col: 4
    name: "Botón 1"
    on_press:
      - logger.log: "Button 1 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_row1_btn1}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_2
    row: 0
    col: 3
    name: "Botón 2"
    on_press:
      - logger.log: "Button 2 - navigate left"
#      - script.execute: script_reset_backlight_timeout
      - script.execute: script_prev_page

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_3
    row: 0
    col: 1
    name: "Botón 3"
    on_press:
      - logger.log: "Button 3 - navigate right"
 #     - script.execute: script_reset_backlight_timeout
      - script.execute: script_next_page

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_4
    row: 1
    col: 0
    name: "Botón 4"
    on_press:
      - logger.log: "Button 4 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_row1_btn4}

  # Media Buttons around the DPad - Page-aware behavior
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_1
    row: 0
    col: 2
    name: "Botón Media 1"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_exit
          else:
            - logger.log: "Media Button 1 Pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_2
    row: 3
    col: 0
    name: "Botón Media 2"
    on_press:
      - logger.log: "Media Button 2 pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_3
    row: 1
    col: 2
    name: "Botón Media 3"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_prev
          else:
            - logger.log: "Media Button 3 pressed"

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_media_4
    row: 4
    col: 0
    name: "Botón Media 4"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_next
          else:
            - logger.log: "Media Button 4 pressed"

  # Dpad buttons - TV navigation
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_up
    row: 1
    col: 3
    name: "DPAD Up"
    on_press:
      - script.execute: script_tv_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_down
    row: 3
    col: 4
    name: "DPAD Down"
    on_press:
      - script.execute: script_tv_down

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_left
    row: 1
    col: 4
    name: "DPAD Left"
    on_press:
      - script.execute: script_tv_left

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_right
    row: 3
    col: 1
    name: "DPAD Right"
    on_press:
      - script.execute: script_tv_right

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_dpad_center
    row: 3
    col: 3
    name: "DPAD Center"
    on_press:
      - script.execute: script_tv_select

  # Volume Buttons - Page-aware (Room/Music = media player, TV = TV IR)
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_up
    row: 3
    col: 2
    name: "Volume Up"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_volume_up
          else:
            - script.execute: script_volume_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_down
    row: 4
    col: 2
    name: "Volume Down"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_volume_down
          else:
            - script.execute: script_volume_down

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_volume_mute
    row: 4
    col: 3
    name: "Mute"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_mute
          else:
            - homeassistant.service:
                service: media_player.volume_mute
                data:
                  entity_id: media_player.${ma_player}
                  is_volume_muted: "True"

  # Channel/Record Buttons - TV remote
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_record
    row: 4
    col: 4
    name: "Record"
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 2;'  # TV page
          then:
            - script.execute: script_tv_media_play_pause
          else:
            - logger.log: "Record - launching automation"
            - homeassistant.service:
                service: script.turn_on
                data:
                  entity_id: ${automation_record}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_up
    row: 4
    col: 1
    name: "Channel Up"
    on_press:
      - script.execute: script_tv_channel_up

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_channel_down
    row: 2
    col: 1
    name: "Channel Down"
    on_press:
      - script.execute: script_tv_channel_down

  # Scene Buttons - Launch automations
  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_1
    row: 2
    col: 2
    name: "Scene Button 1"
    on_press:
      - logger.log: "Scene 1 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_1}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_2
    row: 2
    col: 4
    name: "Scene Button 2"
    on_press:
      - logger.log: "Scene 2 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_2}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_3
    row: 2
    col: 3
    name: "Scene Button 3"
    on_press:
      - logger.log: "Scene 3 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_3}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_scene_4
    row: 2
    col: 0
    name: "Scene Button 4"
    on_press:
      - logger.log: "Scene 4 - launching automation"
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${automation_scene_4}

  - platform: tca8418_keypad
    tca8418_keypad_id: keypad
    id: btn_power_keypad
